function addBeliPart(){
  _beliParts.push({_id:uid(),barang_id:'',nama_barang:'',jumlah:1,satuan:'pcs',harga_beli:0,subtotal:0});renderBeliParts();
}

function renderBeliParts(){
  const tb=document.getElementById('body-beli-parts');if(!tb)return;
  if(!_beliParts.length){tb.innerHTML='<tr><td colspan="6" style="text-align:center;padding:12px;color:var(--text3);font-size:12px">Belum ada item</td></tr>';hitungTotalBeli();return;}
  tb.innerHTML=_beliParts.map((p,i)=>`<tr>
    <td><input list="beli-brg-${i}" value="${p.nama_barang||''}" placeholder="Nama barang..." style="border:1px solid var(--border);border-radius:6px;padding:4px 6px;font-size:12px;width:100%;background:var(--input-bg)" onchange="onBeliPartChange(${i},this.value)"/>
    <datalist id="beli-brg-${i}">${(window._beliBrg||[]).map(b=>`<option value="${b.nama}">${b.nama}</option>`).join('')}</datalist></td>
    <td><input type="number" min="1" value="${p.jumlah||1}" style="border:1px solid var(--border);border-radius:6px;padding:4px;width:55px;font-size:12px;background:var(--input-bg)" onchange="_beliParts[${i}].jumlah=Number(this.value);_beliParts[${i}].subtotal=_beliParts[${i}].jumlah*_beliParts[${i}].harga_beli;renderBeliParts()"/></td>
    <td style="font-size:12px">${p.satuan||'pcs'}</td>
    <td><input type="number" value="${p.harga_beli||0}" style="border:1px solid var(--border);border-radius:6px;padding:4px;width:90px;font-size:12px;background:var(--input-bg)" onchange="_beliParts[${i}].harga_beli=Number(this.value);_beliParts[${i}].subtotal=_beliParts[${i}].jumlah*_beliParts[${i}].harga_beli;renderBeliParts()"/></td>
    <td style="font-weight:600;font-size:12px;color:var(--orange)">${fmt(_beliParts[i].subtotal)}</td>
    <td><button class="btn btn-danger btn-xs" onclick="_beliParts.splice(${i},1);renderBeliParts()"><i class="ti ti-x"></i></button></td>
  </tr>`).join('');
  hitungTotalBeli();
}

function onBeliPartChange(i,val){
  const brg=(window._beliBrg||[]).find(b=>b.nama===val);
  if(brg){_beliParts[i].barang_id=brg.id;_beliParts[i].harga_beli=brg.harga_beli||0;_beliParts[i].satuan=brg.satuan;}
  else _beliParts[i].barang_id='';
  _beliParts[i].nama_barang=val;
  _beliParts[i].subtotal=_beliParts[i].jumlah*_beliParts[i].harga_beli;
  renderBeliParts();
}

function hitungTotalBeli(){
  const t=_beliParts.reduce((a,p)=>a+Number(p.subtotal||0),0);
  const el=document.getElementById('total-beli');if(el)el.textContent=fmt(t);
}

async function saveBeli(){
  const supId=document.getElementById('f-beli-sup').value;
  if(!supId){showToast('Pilih supplier','error');return;}
  if(!_beliParts.some(p=>p.nama_barang)){showToast('Tambahkan minimal 1 item','error');return;}
  const no=document.getElementById('f-beli-no').value;
  const id=uid();
  const total=_beliParts.reduce((a,p)=>a+Number(p.subtotal||0),0);
  const dp=Number(document.getElementById('f-beli-dp').value||0);
  const sisa=Math.max(0,total-dp);
  const metode=document.getElementById('f-beli-metode').value;
  const sup=await dbGet('supplier',supId);
  showLoading(true);
  try{
    await dbOp('pembelian','INSERT',{id,no_faktur:no,tanggal:document.getElementById('f-beli-tgl').value,supplier_id:supId,nama_supplier:sup?.nama||'',total,terbayar:dp,sisa_hutang:sisa,metode_bayar:metode,status_bayar:sisa<=0?'lunas':dp>0?'sebagian':'belum'});
    for(const p of _beliParts){
      if(!p.nama_barang) continue;
      let brgId=p.barang_id;
      if(!brgId){
        const ex=(await loadTbl('barang')).find(b=>b.nama.toLowerCase()===p.nama_barang.toLowerCase());
        if(ex) brgId=ex.id;
        else{brgId=uid();await dbOp('barang','INSERT',{id:brgId,nama:p.nama_barang,kode:'BRG'+Date.now().toString().slice(-5),kategori:'Lainnya',satuan:p.satuan||'pcs',harga_beli:p.harga_beli||0,harga_jual:Math.round(p.harga_beli*1.2)||0,stok:0,stok_minimum:0});}
      }
      await dbOp('detail_pembelian','INSERT',{id:uid(),pembelian_id:id,barang_id:brgId,nama_barang:p.nama_barang,satuan:p.satuan||'pcs',jumlah:p.jumlah||1,harga_beli:p.harga_beli||0,subtotal:p.subtotal||0});
      const brg=await dbGet('barang',brgId);
      const stokBaru=(brg?.stok||0)+Number(p.jumlah||0);
      await dbOp('barang','UPDATE',{id:brgId,payload:{stok:stokBaru,harga_beli:p.harga_beli||brg?.harga_beli||0}});
      await dbOp('mutasi_stok','INSERT',{id:uid(),barang_id:brgId,jenis:'masuk',jumlah:Number(p.jumlah),stok_sebelum:brg?.stok||0,stok_sesudah:stokBaru,referensi_tipe:'pembelian',referensi_no:no,keterangan:'Pembelian '+no,tanggal:document.getElementById('f-beli-tgl').value});
    }
    if(sisa>0) await dbOp('supplier','UPDATE',{id:supId,payload:{saldo_hutang:(sup?.saldo_hutang||0)+sisa}});
    closeModal('modal-beli');showToast('Pembelian disimpan');await showPage('pembelian',true);
  }catch(e){showToast('Gagal: '+e.message,'error');}
  showLoading(false);
}

async function delBeli(btn){const id=btn?.dataset?.id||btn;const no=btn?.dataset?.no||'';
  if(!await confirm2(`Hapus pembelian ${no}?`)) return;
  showLoading(true);
  try{
    const parts=await loadTbl('detail_pembelian',q=>q.eq('pembelian_id',id));
    for(const p of parts) await dbOp('detail_pembelian','DELETE',{id:p.id});
    await dbOp('pembelian','DELETE',{id});
    showToast('Pembelian dihapus');await showPage('pembelian',true);
  }catch(e){showToast('Gagal: '+e.message,'error');}
  showLoading(false);
}

pages['bayar_hutang']=async()=>{
  document.getElementById('content').innerHTML=`
  <div class="page-header"><div class="page-title"><i class="ti ti-cash"></i> Bayar Hutang</div>
    <button class="btn btn-primary" onclick="openBayarHutang()"><i class="ti ti-plus"></i> Catat Pembayaran</button>
  </div>
  <div class="section-hdr"><h2><i class="ti ti-alert-circle"></i> Hutang Belum Lunas</h2></div>
  <div class="table-wrap"><table><thead><tr><th>No Faktur</th><th>Tanggal</th><th>Supplier</th><th>Total</th><th>Sisa Hutang</th><th>Aksi</th></tr></thead>
  <tbody id="body-hutang"></tbody></table></div>
  <div class="section-hdr" style="margin-top:16px"><h2><i class="ti ti-history"></i> Riwayat Pembayaran</h2></div>
  <div class="table-wrap"><table><thead><tr><th>No Bayar</th><th>Tanggal</th><th>Supplier</th><th>Jumlah</th><th>Metode</th><th>Aksi</th></tr></thead>

async function loadHutangList(){
  const [data,sups]=await Promise.all([loadTbl('pembelian'),loadTbl('supplier')]);
  const sMap=Object.fromEntries(sups.map(s=>[s.id,s.nama]));
  const rows=data.filter(b=>b.status_bayar!=='lunas').sort((a,b)=>b.tanggal?.localeCompare(a.tanggal));
  const tb=document.getElementById('body-hutang');if(!tb)return;
  tb.innerHTML=rows.length?rows.map(b=>`<tr>
    <td><code style="color:var(--orange)">${b.no_faktur}</code></td>
    <td>${fmtDate(b.tanggal)}</td><td>${b.nama_supplier||sMap[b.supplier_id]||'-'}</td>
    <td>${fmt(b.total)}</td>
    <td style="color:var(--red);font-weight:700">${fmt(b.sisa_hutang)}</td>
    <td><button class="btn btn-primary btn-xs" onclick="openBayarHutang('${b.id}')"><i class="ti ti-cash"></i> Bayar</button></td>
  </tr>`).join(''):'<tr><td colspan="6" class="table-empty" style="color:var(--green)"><i class="ti ti-check"></i> Tidak ada hutang</td></tr>';
}

async function loadRiwayatHutang(){
  const [data,sups]=await Promise.all([loadTbl('pembayaran_hutang',q=>q.order('tanggal',{ascending:false})),loadTbl('supplier')]);
  const sMap=Object.fromEntries(sups.map(s=>[s.id,s.nama]));
  const tb=document.getElementById('body-riwayat-hutang');if(!tb)return;
  tb.innerHTML=data.length?data.slice(0,50).map(r=>`<tr>
    <td><code style="color:var(--orange)">${r.no_bayar||'-'}</code></td>
    <td>${fmtDate(r.tanggal)}</td>
    <td>${r.supplier_id?sMap[r.supplier_id]||'-':'-'}</td>
    <td style="color:var(--red);font-weight:700">${fmt(r.jumlah)}</td>
    <td>${r.metode||'-'}</td>
    <td><button class="btn btn-danger btn-xs" onclick="delRiwayatHutang('${r.id}')"><i class="ti ti-trash"></i></button></td>
  </tr>`).join(''):'<tr><td colspan="6" class="table-empty">Belum ada riwayat</td></tr>';
}

async function openBayarHutang(fakturId=null){
  ensureModal('modal-bayar-hutang',`<div class="modal">
    <div class="modal-header"><span class="modal-title">Catat Pembayaran Hutang</span><button class="modal-close" onclick="closeModal('modal-bayar-hutang')"><i class="ti ti-x"></i></button></div>
    <div class="modal-body">
      <div class="form-grid">
        <div class="form-group"><label class="form-label">No. Bayar</label><input id="f-bh-no" class="form-input"/></div>
        <div class="form-group"><label class="form-label">Tanggal</label><input id="f-bh-tgl" class="form-input" type="date" value="${today()}"/></div>
        <div class="form-group form-full"><label class="form-label">Faktur <span class="req">*</span></label><select id="f-bh-faktur" class="form-input" onchange="onBHFakturChange()"><option>Memuat...</option></select></div>
        <div class="form-group"><label class="form-label">Sisa Hutang</label><input id="f-bh-sisa" class="form-input" disabled style="color:var(--red);font-weight:700"/></div>
        <div class="form-group"><label class="form-label">Jumlah Bayar <span class="req">*</span></label><input id="f-bh-jumlah" class="form-input" type="number" min="0"/></div>
        <div class="form-group"><label class="form-label">Metode</label>
          <select id="f-bh-metode" class="form-input"><option value="tunai">Tunai</option><option value="transfer">Transfer</option></select>
        </div>
        <div class="form-group form-full"><label class="form-label">Keterangan</label><textarea id="f-bh-ket" class="form-input"></textarea></div>
      </div>
      <input type="hidden" id="f-bh-sup-id"/>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('modal-bayar-hutang')">Batal</button>
      <button class="btn btn-primary" onclick="saveBayarHutang()"><i class="ti ti-device-floppy"></i>Simpan</button>
    </div>
  </div>`);
  openModal('modal-bayar-hutang');
  const [belis,sups,no]=await Promise.all([loadTbl('pembelian'),loadTbl('supplier'),autoNo('BH','pembayaran_hutang','no_bayar')]);
  const sMap=Object.fromEntries(sups.map(s=>[s.id,s.nama]));
  const hutang=belis.filter(b=>b.status_bayar!=='lunas');
  const sel=document.getElementById('f-bh-faktur');
  if(sel) sel.innerHTML='<option value="">-- Pilih Faktur --</option>'+hutang.map(b=>`<option value="${b.id}" data-sisa="${b.sisa_hutang}" data-sup="${b.supplier_id}">${b.no_faktur} - ${b.nama_supplier||sMap[b.supplier_id]||'-'} - Sisa: ${fmt(b.sisa_hutang)}</option>`).join('');
  document.getElementById('f-bh-no').value=no;
  if(fakturId&&sel){sel.value=fakturId;onBHFakturChange();}
}

function onBHFakturChange(){
  const opt=document.getElementById('f-bh-faktur')?.selectedOptions[0];
  if(!opt?.value)return;
  document.getElementById('f-bh-sisa').value=fmt(Number(opt.dataset.sisa));
  document.getElementById('f-bh-jumlah').value=Number(opt.dataset.sisa)||'';
  document.getElementById('f-bh-sup-id').value=opt.dataset.sup||'';
}

async function saveBayarHutang(){
  const fakturId=document.getElementById('f-bh-faktur').value;
  const supId=document.getElementById('f-bh-sup-id').value;
  const jumlah=Number(document.getElementById('f-bh-jumlah').value||0);
  const no=document.getElementById('f-bh-no').value;
  if(!fakturId){showToast('Pilih faktur','error');return;}
  if(!jumlah||jumlah<=0){showToast('Jumlah tidak valid','error');return;}
  showLoading(true);
  try{
    await dbOp('pembayaran_hutang','INSERT',{id:uid(),no_bayar:no,tanggal:document.getElementById('f-bh-tgl').value,supplier_id:supId||null,pembelian_id:fakturId,jumlah,metode:document.getElementById('f-bh-metode').value,keterangan:document.getElementById('f-bh-ket').value});
    const fk=await dbGet('pembelian',fakturId);
    if(fk){
      const newTerbayar=(fk.terbayar||0)+jumlah;
      const newSisa=Math.max(0,(fk.total||0)-newTerbayar);
      await dbOp('pembelian','UPDATE',{id:fakturId,payload:{terbayar:newTerbayar,sisa_hutang:newSisa,status_bayar:newSisa<=0?'lunas':newTerbayar>0?'sebagian':'belum'}});
    }
    if(supId){
      const sup=await dbGet('supplier',supId);
      await dbOp('supplier','UPDATE',{id:supId,payload:{saldo_hutang:Math.max(0,(sup?.saldo_hutang||0)-jumlah)}});
    }
    closeModal('modal-bayar-hutang');showToast('Pembayaran hutang dicatat');
    await loadHutangList();await loadRiwayatHutang();
  }catch(e){showToast('Gagal: '+e.message,'error');}
  showLoading(false);
}

async function delRiwayatHutang(id){
  if(!await confirm2('Hapus riwayat ini?')) return;
  showLoading(true);
  try{await dbOp('pembayaran_hutang','DELETE',{id});showToast('Dihapus');await loadRiwayatHutang();}
  catch(e){showToast('Gagal: '+e.message,'error');}
  showLoading(false);
}

async function renderPORows(data){
  if(!data.length) return '<tr><td colspan="7" class="table-empty">Belum ada PO</td></tr>';
  // Load semua detail PO sekaligus
  const allDetail=await loadTbl('detail_pesanan_beli');
  const detMap={};
  allDetail.forEach(d=>{
    if(!detMap[d.pesanan_beli_id]) detMap[d.pesanan_beli_id]=[];
    detMap[d.pesanan_beli_id].push(d);
  });
  return data.map(p=>{
    const items=detMap[p.id]||[];
    const itemStr=items.length
      ? items.map(d=>'<span style="display:inline-block;background:var(--bg3);border:1px solid var(--border);border-radius:4px;padding:1px 6px;font-size:11px;margin:1px">'+d.nama_barang+' <b>('+fmtNum(d.jumlah)+' '+d.satuan+')</b></span>').join(' ')
      : '<span style="color:var(--text3);font-size:11px">-</span>';
    return '<tr>'+
      '<td><code style="color:var(--orange)">'+p.no_po+'</code></td>'+
      '<td>'+fmtDate(p.tanggal)+'</td>'+
      '<td>'+(p.nama_supplier||'-')+'</td>'+
      '<td style="max-width:250px;white-space:normal">'+itemStr+'</td>'+
      '<td style="font-weight:700">'+fmt(p.total)+'</td>'+
      '<td><select class="form-input" style="font-size:11px;padding:3px 6px;width:100px" data-id="'+(p.id)+'" onchange="updateStatusPO(this.dataset.id,this.value)">'+
        '<option value="draft"'+(p.status==='draft'?' selected':'')+'>Draft</option>'+
        '<option value="dikirim"'+(p.status==='dikirim'?' selected':'')+'>Dikirim</option>'+
        '<option value="diterima"'+(p.status==='diterima'?' selected':'')+'>Diterima</option>'+
        '<option value="batal"'+(p.status==='batal'?' selected':'')+'>Batal</option>'+
      '</select></td>'+
      '<td><div class="table-actions">'+
        '<button class="btn btn-outline btn-xs" onclick="editPO(this)" data-id="'+p.id+'"><i class="ti ti-edit"></i></button>'+
        '<button class="btn btn-danger btn-xs" onclick="delPO(this)" data-id="'+p.id+'" data-no="'+p.no_po+'"><i class="ti ti-trash"></i></button>'+
      '</div></td>'+
    '</tr>';
  }).join('');
}

function ensurePOModal(){}
async function openPO(){

async function updatePO(id){
  const supId=document.getElementById('f-po-sup').value;
  if(!supId){showToast('Pilih supplier','error');return;}
  const total=_poParts.reduce((a,p)=>a+Number(p.subtotal||0),0);
  const sup=await dbGet('supplier',supId);
  const status=document.getElementById('f-po-status')?.value||'draft';
  showLoading(true);
  try{
    await dbOp('pesanan_beli','UPDATE',{id,payload:{no_po:document.getElementById('f-po-no').value,tanggal:document.getElementById('f-po-tgl').value,supplier_id:supId,nama_supplier:sup?.nama||'',total,status,catatan:document.getElementById('f-po-catatan').value}});
    // Hapus detail lama, insert baru
    const oldItems=await loadTbl('detail_pesanan_beli',q=>q.eq('pesanan_beli_id',id));
    for(const it of oldItems) await dbOp('detail_pesanan_beli','DELETE',{id:it.id});
    if(isOnline) try{await sb.from('detail_pesanan_beli').delete().eq('pesanan_beli_id',id);}catch(e){}
    for(const p of _poParts){
      if(!p.nama) continue;
      await dbOp('detail_pesanan_beli','INSERT',{id:uid(),pesanan_beli_id:id,nama_barang:p.nama,satuan:p.satuan,jumlah:p.jumlah,harga_est:p.harga,subtotal:p.subtotal});
    }
    closeModal('modal-po');showToast('PO diperbarui');await showPage('po',true);
  }catch(e){showToast('Gagal: '+e.message,'error');}
  showLoading(false);
}

async function updateStatusPO(id, status){
  try{
    await dbOp('pesanan_beli','UPDATE',{id,payload:{status}});
    showToast('Status PO diperbarui');
  }catch(e){showToast('Gagal update status','error');}
}

async function delPO(btn){const id=btn?.dataset?.id||btn;const no=btn?.dataset?.no||'';
  if(!await confirm2(`Hapus PO ${no}?`)) return;
  showLoading(true);
  try{
    const items=await loadTbl('detail_pesanan_beli',q=>q.eq('pesanan_beli_id',id));

  }catch(e){showToast('Gagal: '+e.message,'error');}
  showLoading(false);
}

async function updateSO(id){
  const pelId=document.getElementById('f-so-pel').value||null;
  const total=_soParts.reduce((a,p)=>a+Number(p.subtotal||0),0);
  const status=document.getElementById('f-so-status')?.value||'draft';
  const pels=await loadTbl('pelanggan');
  showLoading(true);
  try{
    await dbOp('pesanan_jual','UPDATE',{id,payload:{no_so:document.getElementById('f-so-no').value,tanggal:document.getElementById('f-so-tgl').value,pelanggan_id:pelId,nama_pelanggan:pelId?pels.find(p=>p.id===pelId)?.nama||'':'Umum',total,status}});
    const oldItems=await loadTbl('detail_pesanan_jual',q=>q.eq('pesanan_jual_id',id));
    for(const it of oldItems) await dbOp('detail_pesanan_jual','DELETE',{id:it.id});
    if(isOnline) try{await sb.from('detail_pesanan_jual').delete().eq('pesanan_jual_id',id);}catch(e){}
    for(const p of _soParts){
      if(!p.nama) continue;
      await dbOp('detail_pesanan_jual','INSERT',{id:uid(),pesanan_jual_id:id,barang_id:p.barang_id||null,nama_barang:p.nama,satuan:p.satuan||'pcs',jumlah:p.jumlah||1,harga_jual:p.harga||0,subtotal:p.subtotal||0});
    }
    closeModal('modal-so');showToast('SO diperbarui');await showPage('so',true);
  }catch(e){showToast('Gagal: '+e.message,'error');}
  showLoading(false);
}

async function saveReturBeli(){
  const fakturId=document.getElementById('f-rb-faktur').value;
  if(!fakturId){showToast('Pilih faktur','error');return;}
  const no=document.getElementById('f-rb-no').value;
  const supId=document.getElementById('f-rb-sup-id').value;
  const supNama=document.getElementById('f-rb-sup-nama').value;
  const fakturNo=document.getElementById('f-rb-faktur-no').value;
  const inputs=document.querySelectorAll('[id^="rb-qty-"]');
  const items=[];
  inputs.forEach(inp=>{
    const qty=Number(inp.value||0);
    if(qty>0) items.push({id:inp.dataset.id,barang_id:inp.dataset.brg,nama:inp.dataset.nama,satuan:inp.dataset.satuan,harga:Number(inp.dataset.harga),qty});
  });
  if(!items.length){showToast('Isi qty retur minimal 1 item','error');return;}
  const total=items.reduce((a,it)=>a+it.qty*it.harga,0);
  const id=uid();
  showLoading(true);
  try{
    await dbOp('retur_beli','INSERT',{id,no_retur:no,tanggal:document.getElementById('f-rb-tgl').value,pembelian_id:fakturId,supplier_id:supId||null,nama_supplier:supNama,no_faktur_asal:fakturNo,total,alasan:document.getElementById('f-rb-alasan').value});
    for(const it of items){
      await dbOp('detail_retur_beli','INSERT',{id:uid(),retur_beli_id:id,barang_id:it.barang_id||null,nama_barang:it.nama,satuan:it.satuan,jumlah:it.qty,harga_beli:it.harga,subtotal:it.qty*it.harga});
      if(it.barang_id){
        const brg=await dbGet('barang',it.barang_id);
        const stokBaru=Math.max(0,(brg?.stok||0)-it.qty);
        await dbOp('barang','UPDATE',{id:it.barang_id,payload:{stok:stokBaru}});
        await dbOp('mutasi_stok','INSERT',{id:uid(),barang_id:it.barang_id,jenis:'keluar',jumlah:it.qty,stok_sebelum:brg?.stok||0,stok_sesudah:stokBaru,referensi_tipe:'retur_beli',referensi_no:no,keterangan:'Retur beli '+no,tanggal:document.getElementById('f-rb-tgl').value});
      }
    }
    closeModal('modal-retur-beli');showToast('Retur pembelian disimpan');await showPage('retur_beli',true);
  }catch(e){showToast('Gagal: '+e.message,'error');}
  showLoading(false);
}

async function tambahKatPen(){

  try{await dbOp('kategori_pengeluaran','INSERT',{id:uid(),nama:nama.trim()});}catch(e){}

async function savePengeluaran(){
  const ket=(document.getElementById('f-p-ket').value||'').trim();
  const nom=Number(document.getElementById('f-p-nom').value||0);
  if(!ket){showToast('Keterangan wajib diisi','error');return;}
  if(!nom||nom<=0){showToast('Nominal tidak valid','error');return;}
  showLoading(true);
  try{
    await dbOp('pengeluaran','INSERT',{id:uid(),tanggal:document.getElementById('f-p-tgl').value,keterangan:ket,nominal:nom,kategori:document.getElementById('f-p-kat').value,metode:document.getElementById('f-p-metode').value});

  showLoading(false);
}

async function delPengeluaran(id){

  showLoading(true);
  try{await dbOp('pengeluaran','DELETE',{id});showToast('Dihapus');await showPage('pengeluaran',true);}
  catch(e){showToast('Gagal: '+e.message,'error');}
  showLoading(false);
}

let _lapTipe='penjualan';
function switchLap(tipe,el){
  _lapTipe=tipe;
  document.querySelectorAll('.tabs .tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  generateLap();
}

async function generateLap(){
  const dari=document.getElementById('lap-dari')?.value||'';
  const sampai=document.getElementById('lap-sampai')?.value||'';
  const el=document.getElementById('lap-body');
  if(!el) return;
  el.innerHTML='<div style="text-align:center;padding:20px"><div class="spinner"></div></div>';
  let html='';

  if(_lapTipe==='penjualan'){
    // Load penjualan + detail item
    const [data, detailAll] = await Promise.all([
      loadTbl('penjualan'), loadTbl('detail_penjualan')
    ]);
    const f=data.filter(r=>(!dari||r.tanggal>=dari)&&(!sampai||r.tanggal<=sampai))
               .sort((a,b)=>b.tanggal.localeCompare(a.tanggal));
    const total=f.reduce((a,r)=>a+Number(r.total||0),0);
    // Map detail per penjualan_id
    const detMap={};
    detailAll.forEach(d=>{
      if(!detMap[d.penjualan_id]) detMap[d.penjualan_id]=[];
      detMap[d.penjualan_id].push(d);
    });
    html=`<div style="margin-bottom:10px;font-weight:700;color:var(--orange)">Total Penjualan: ${fmt(total)} &nbsp;|&nbsp; ${f.length} transaksi</div>
    <div class="table-wrap"><table><thead><tr><th>No Faktur</th><th>Tanggal</th><th>Pelanggan</th><th>Item / Barang</th><th>Total</th><th>Metode</th><th>Status</th></tr></thead>
    <tbody>${f.map(r=>{
      const items=detMap[r.id]||[];
      const itemStr=items.length?items.map(d=>d.nama_barang+' ('+fmtNum(d.jumlah)+' '+d.satuan+')').join(', '):'<span style="color:var(--text3)">-</span>';
      return '<tr><td><code>'+r.no_faktur+'</code></td><td>'+fmtDate(r.tanggal)+'</td><td>'+(r.nama_pelanggan||'Umum')+'</td><td style="font-size:11px;max-width:200px">'+itemStr+'</td><td style="font-weight:700">'+fmt(r.total)+'</td><td>'+(r.metode_bayar||'-')+'</td><td><span class="badge '+(r.status_bayar==='lunas'?'badge-green':'badge-red')+'">'+(r.status_bayar||'belum')+'</span></td></tr>';
    }).join('')||'<tr><td colspan="7" class="table-empty">Tidak ada data</td></tr>'}</tbody></table></div>`;

  } else if(_lapTipe==='pembelian'){
    const [data, detailAll] = await Promise.all([
      loadTbl('pembelian'), loadTbl('detail_pembelian')
    ]);
    const f=data.filter(r=>(!dari||r.tanggal>=dari)&&(!sampai||r.tanggal<=sampai))
               .sort((a,b)=>b.tanggal.localeCompare(a.tanggal));
    const total=f.reduce((a,r)=>a+Number(r.total||0),0);
    const detMap={};
    detailAll.forEach(d=>{
      if(!detMap[d.pembelian_id]) detMap[d.pembelian_id]=[];
      detMap[d.pembelian_id].push(d);
    });
    html=`<div style="margin-bottom:10px;font-weight:700;color:var(--orange)">Total Pembelian: ${fmt(total)} &nbsp;|&nbsp; ${f.length} faktur</div>
    <div class="table-wrap"><table><thead><tr><th>No Faktur</th><th>Tanggal</th><th>Supplier</th><th>Item / Barang</th><th>Total</th><th>Sisa Hutang</th></tr></thead>
    <tbody>${f.map(r=>{
      const items=detMap[r.id]||[];
      const itemStr=items.length?items.map(d=>d.nama_barang+' ('+fmtNum(d.jumlah)+' '+d.satuan+')').join(', '):'<span style="color:var(--text3)">-</span>';
      return '<tr><td><code>'+r.no_faktur+'</code></td><td>'+fmtDate(r.tanggal)+'</td><td>'+(r.nama_supplier||'-')+'</td><td style="font-size:11px;max-width:200px">'+itemStr+'</td><td>'+fmt(r.total)+'</td><td style="color:'+(Number(r.sisa_hutang)>0?'var(--red)':'var(--text3)')+'">'+fmt(r.sisa_hutang)+'</td></tr>';
    }).join('')||'<tr><td colspan="6" class="table-empty">Tidak ada data</td></tr>'}</tbody></table></div>`;

  } else if(_lapTipe==='stok'){
    const [data, mutasiAll] = await Promise.all([
      loadTbl('barang'), loadTbl('mutasi_stok')
    ]);
    const low=data.filter(b=>Number(b.stok)<=Number(b.stok_minimum||0));
    // Hitung total masuk & keluar per barang
    const mutMap={};
    mutasiAll.forEach(m=>{
      if(!mutMap[m.barang_id]) mutMap[m.barang_id]={masuk:0,keluar:0};
      if(m.jenis==='masuk') mutMap[m.barang_id].masuk+=Number(m.jumlah||0);
      else mutMap[m.barang_id].keluar+=Math.abs(Number(m.jumlah||0));
    });
    html=`<div style="margin-bottom:10px;font-weight:700;color:var(--orange)">${data.length} barang &nbsp;|&nbsp; <span style="color:var(--red)">${low.length} item stok menipis</span></div>
    <div class="table-wrap"><table><thead><tr><th>Kode</th><th>Nama Barang</th><th>Kategori</th><th>Satuan</th><th>Stok</th><th>Min</th><th>Total Masuk</th><th>Total Keluar</th><th>Harga Beli</th><th>Harga Jual</th></tr></thead>
    <tbody>${data.map(b=>{
      const m=mutMap[b.id]||{masuk:0,keluar:0};
      const low=Number(b.stok)<=Number(b.stok_minimum||0);
      return '<tr'+(low?' style="background:rgba(192,57,43,.05)"':'')+'><td><code style="font-size:11px">'+(b.kode||'-')+'</code></td><td style="font-weight:600">'+(b.nama||'-')+'</td><td>'+(b.kategori||'-')+'</td><td>'+(b.satuan||'pcs')+'</td><td style="font-weight:700;color:'+(low?'var(--red)':'var(--green)')+'">'+fmtNum(b.stok)+'</td><td style="color:var(--text3)">'+fmtNum(b.stok_minimum||0)+'</td><td style="color:var(--green)">'+fmtNum(m.masuk)+'</td><td style="color:var(--red)">'+fmtNum(m.keluar)+'</td><td>'+fmt(b.harga_beli)+'</td><td style="color:var(--orange);font-weight:600">'+fmt(b.harga_jual)+'</td></tr>';
    }).join('')||'<tr><td colspan="10" class="table-empty">Tidak ada data</td></tr>'}</tbody></table></div>`;

  } else if(_lapTipe==='piutang'){
    const [pj,wo,dpj,dwo]=await Promise.all([
      loadTbl('penjualan'), loadTbl('work_order'),
      loadTbl('detail_penjualan'), loadTbl('detail_wo_part')
    ]);
    const rows=[
      ...pj.filter(r=>Number(r.sisa_piutang)>0).map(r=>({...r,_tipe:'Penjualan',_no:r.no_faktur,_detail:dpj.filter(d=>d.penjualan_id===r.id)})),
      ...wo.filter(w=>Number(w.sisa_piutang)>0).map(w=>({...w,_tipe:'Service',_no:w.no_wo,_detail:dwo.filter(d=>d.work_order_id===w.id)}))
    ].sort((a,b)=>b.tanggal.localeCompare(a.tanggal));
    const total=rows.reduce((a,r)=>a+Number(r.sisa_piutang||0),0);
    html=`<div style="margin-bottom:10px;font-weight:700;color:var(--red)">Total Piutang: ${fmt(total)} &nbsp;|&nbsp; ${rows.length} tagihan</div>
    <div class="table-wrap"><table><thead><tr><th>No Dokumen</th><th>Tipe</th><th>Tanggal</th><th>Pelanggan</th><th>Item / Barang</th><th>Total</th><th>Sisa Piutang</th></tr></thead>
    <tbody>${rows.map(r=>{
      const itemStr=r._detail&&r._detail.length?r._detail.map(d=>d.nama_barang+' ('+fmtNum(d.jumlah)+')').join(', '):'<span style="color:var(--text3)">-</span>';
      return '<tr><td><code>'+r._no+'</code></td><td><span class="badge '+(r._tipe==='Service'?'badge-orange':'badge-brown')+'">'+r._tipe+'</span></td><td>'+fmtDate(r.tanggal)+'</td><td>'+(r.nama_pelanggan||'Umum')+'</td><td style="font-size:11px;max-width:180px">'+itemStr+'</td><td>'+fmt(r.total)+'</td><td style="color:var(--red);font-weight:700">'+fmt(r.sisa_piutang)+'</td></tr>';
    }).join('')||'<tr><td colspan="7" class="table-empty">Tidak ada piutang</td></tr>'}</tbody></table></div>`;

  } else if(_lapTipe==='hutang'){
    const [data, detailAll] = await Promise.all([
      loadTbl('pembelian'), loadTbl('detail_pembelian')
    ]);
    const rows=data.filter(r=>Number(r.sisa_hutang)>0)
                   .sort((a,b)=>b.tanggal.localeCompare(a.tanggal));
    const total=rows.reduce((a,r)=>a+Number(r.sisa_hutang||0),0);
    const detMap={};
    detailAll.forEach(d=>{
      if(!detMap[d.pembelian_id]) detMap[d.pembelian_id]=[];
      detMap[d.pembelian_id].push(d);
    });
    html=`<div style="margin-bottom:10px;font-weight:700;color:var(--red)">Total Hutang: ${fmt(total)} &nbsp;|&nbsp; ${rows.length} faktur</div>
    <div class="table-wrap"><table><thead><tr><th>No Faktur</th><th>Tanggal</th><th>Supplier</th><th>Item / Barang</th><th>Total</th><th>Terbayar</th><th>Sisa Hutang</th></tr></thead>
    <tbody>${rows.map(r=>{
      const items=detMap[r.id]||[];
      const itemStr=items.length?items.map(d=>d.nama_barang+' ('+fmtNum(d.jumlah)+' '+d.satuan+')').join(', '):'<span style="color:var(--text3)">-</span>';
      return '<tr><td><code>'+r.no_faktur+'</code></td><td>'+fmtDate(r.tanggal)+'</td><td>'+(r.nama_supplier||'-')+'</td><td style="font-size:11px;max-width:180px">'+itemStr+'</td><td>'+fmt(r.total)+'</td><td style="color:var(--green)">'+fmt(r.terbayar)+'</td><td style="color:var(--red);font-weight:700">'+fmt(r.sisa_hutang)+'</td></tr>';
    }).join('')||'<tr><td colspan="7" class="table-empty">Tidak ada hutang</td></tr>'}</tbody></table></div>`;

  } else if(_lapTipe==='pengeluaran'){
    const data=await loadTbl('pengeluaran');
    const f=data.filter(r=>(!dari||r.tanggal>=dari)&&(!sampai||r.tanggal<=sampai))
               .sort((a,b)=>b.tanggal.localeCompare(a.tanggal));
    const total=f.reduce((a,r)=>a+Number(r.nominal||0),0);
    const byKat={};
    f.forEach(r=>{const k=r.kategori||'Lainnya';if(!byKat[k])byKat[k]=0;byKat[k]+=Number(r.nominal||0);});
    html=`<div style="margin-bottom:10px;font-weight:700;color:var(--red)">Total Pengeluaran: ${fmt(total)} &nbsp;|&nbsp; ${f.length} transaksi</div>
    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px">${Object.entries(byKat).map(([k,v])=>'<div style="background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:8px 12px;font-size:12px"><div style="color:var(--text3)">'+k+'</div><div style="font-weight:700;color:var(--orange)">'+fmt(v)+'</div></div>').join('')}</div>
    <div class="table-wrap"><table><thead><tr><th>Tanggal</th><th>Keterangan / Nama Transaksi</th><th>Kategori</th><th>Metode</th><th>Nominal</th></tr></thead>
    <tbody>${f.map(r=>'<tr><td>'+fmtDate(r.tanggal)+'</td><td style="font-weight:500">'+(r.keterangan||'-')+'</td><td><span class="badge badge-brown">'+(r.kategori||'-')+'</span></td><td>'+(r.metode||'-')+'</td><td style="color:var(--red);font-weight:700">'+fmt(r.nominal)+'</td></tr>').join('')||'<tr><td colspan="5" class="table-empty">Tidak ada data</td></tr>'}</tbody></table></div>`;
  }
  el.innerHTML=html;
}

async function loadSyncInfo(){
  const q=await idbGetAll('queue');
  const pending=q.filter(x=>x.status==='pending').length;
  const el=document.getElementById('sync-info');
  if(el) el.textContent=`Data pending sync: ${pending} | Status: ${isOnline?'Online':'Offline'}`;
}

async function getSettings(){
  try{
    const cached=await getCache('pengaturan');
    if(cached&&cached.length) return cached[0];
    if(isOnline){
      const {data}=await sb.from('pengaturan').select('*').limit(1);
      if(data&&data.length){await setCache('pengaturan',data);return data[0];}
    }
  }catch(e){}
  return null;
}

function onLogoChange(input){
  const file=input.files[0];
  if(!file) return;
  if(file.size>300*1024){showToast('Ukuran gambar terlalu besar (maks 300KB)','error');return;}
  const reader=new FileReader();
  reader.onload=e=>{
    window._logoB64=e.target.result;
    const prev=document.getElementById('logo-preview');
    if(prev) prev.innerHTML=`<img src="${e.target.result}" style="width:100%;height:100%;object-fit:contain"/>`;
    showToast('Gambar siap — klik Simpan untuk menyimpan','info');
  };
  reader.readAsDataURL(file);
}

async function hapusLogo(){
  if(!await confirm2('Hapus logo dari nota?')) return;

const BACKUP_TABLES=['pelanggan', 'kendaraan', 'mekanik', 'supplier', 'barang', 'mutasi_stok', 'work_order', 'detail_wo_part', 'surat_perintah_kerja', 'detail_spk', 'penjualan', 'detail_penjualan', 'pembayaran_piutang', 'retur_jual', 'detail_retur_jual', 'pembelian', 'detail_pembelian', 'pembayaran_hutang', 'retur_beli', 'detail_retur_beli', 'pesanan_beli', 'detail_pesanan_beli', 'pesanan_jual', 'detail_pesanan_jual', 'pengeluaran', 'pengaturan'];

async function doBackup(){
  const btn=document.getElementById('btn-backup');
  const prog=document.getElementById('backup-progress');
  btn.disabled=true;
  btn.innerHTML='<i class="ti ti-loader"></i> Memproses...';

  const backup={
    version:'1.0',
    app:'WAS GARAGE MANADO',
    timestamp:new Date().toISOString(),
    tables:{}
  };

  for(const tbl of BACKUP_TABLES){
    prog.innerHTML=`Mengambil tabel <b>${tbl}</b>...`;
    try{
      // Ambil semua data tanpa limit
      let url=`${SUPABASE_URL}/rest/v1/${tbl}?select=*&limit=10000`;
      const r=await fetch(url,{headers:{'apikey':SUPABASE_ANON_KEY,'Authorization':'Bearer '+SUPABASE_ANON_KEY}});
      const d=await r.json().catch(()=>[]);
      backup.tables[tbl]=Array.isArray(d)?d:[];
      prog.innerHTML=`✅ ${tbl}: ${backup.tables[tbl].length} baris`;
    }catch(e){
      backup.tables[tbl]=[];
      prog.innerHTML=`⚠️ ${tbl}: gagal (${e.message})`;
    }
    await new Promise(r=>setTimeout(r,100));
  }

  // Hitung total
  const total=Object.values(backup.tables).reduce((a,v)=>a+v.length,0);
  prog.innerHTML=`✅ Selesai! Total <b>${total} baris</b> dari <b>${BACKUP_TABLES.length} tabel</b>`;

  // Download file JSON
  const blob=new Blob([JSON.stringify(backup,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;
  a.download=`wasgarage-backup-${new Date().toISOString().slice(0,10)}.json`;
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  URL.revokeObjectURL(url);

  btn.disabled=false;
  btn.innerHTML='<i class="ti ti-database-export"></i> Backup Sekarang';
  showToast('Backup berhasil diunduh!','success');
}

let _restoreData=null;

function previewRestore(input){
  const file=input.files[0];
  const prev=document.getElementById('restore-preview');
  const btn=document.getElementById('btn-restore');
  if(!file){prev.innerHTML='';btn.disabled=true;return;}

  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const data=JSON.parse(e.target.result);
      if(!data.tables||!data.version){
        prev.innerHTML='<span style="color:var(--red)">❌ File tidak valid. Harus file backup WAS GARAGE MANADO.</span>';
        btn.disabled=true;_restoreData=null;return;
      }
      const total=Object.values(data.tables).reduce((a,v)=>a+v.length,0);
      const tblCount=Object.keys(data.tables).length;
      prev.innerHTML=`✅ File valid<br>
        📅 Dibuat: <b>${new Date(data.timestamp).toLocaleString('id-ID')}</b><br>
        📦 Tabel: <b>${tblCount}</b> | Total baris: <b>${total}</b>`;
      _restoreData=data;
      btn.disabled=false;
    }catch(err){
      prev.innerHTML='<span style="color:var(--red)">❌ File tidak bisa dibaca: '+err.message+'</span>';
      btn.disabled=true;_restoreData=null;
    }
  };
  reader.readAsText(file);
}

async function doRestore(){
  if(!_restoreData){showToast('Pilih file backup dulu','error');return;}
  if(!await confirm2('⚠️ PERHATIAN!\n\nRestore akan menimpa data yang ada di Supabase.\nPastikan Anda sudah backup data terbaru.\n\nLanjutkan restore?')) return;

  const btn=document.getElementById('btn-restore');
  const prog=document.getElementById('restore-preview');
  btn.disabled=true;
  showLoading(true);

  let sukses=0,gagal=0,totalBaris=0;

  for(const tbl of BACKUP_TABLES){
    const rows=_restoreData.tables[tbl]||[];
    if(!rows.length) continue;
    prog.innerHTML=`Merestore tabel <b>${tbl}</b> (${rows.length} baris)...`;

    try{
      // Upsert batch per 50 baris
      const batchSize=50;
      for(let i=0;i<rows.length;i+=batchSize){
        const batch=rows.slice(i,i+batchSize);
        const url=`${SUPABASE_URL}/rest/v1/${tbl}?on_conflict=id`;
        const r=await fetch(url,{
          method:'POST',
          headers:{
            'apikey':SUPABASE_ANON_KEY,
            'Authorization':'Bearer '+SUPABASE_ANON_KEY,
            'Content-Type':'application/json',
            'Prefer':'resolution=merge-duplicates,return=minimal'
          },
          body:JSON.stringify(batch)
        });
        if(!r.ok){
          const err=await r.json().catch(()=>({}));
          throw new Error(err.message||'HTTP '+r.status);
        }
      }
      sukses++;totalBaris+=rows.length;
    }catch(e){
      gagal++;
      console.error('Restore error',tbl,e);
    }
    await new Promise(r=>setTimeout(r,100));
  }

  showLoading(false);
  prog.innerHTML=`✅ Restore selesai!<br>
    Berhasil: <b style="color:var(--green)">${sukses} tabel, ${totalBaris} baris</b><br>
    ${gagal>0?'Gagal: <b style="color:var(--red)">'+gagal+' tabel</b>':''}`;
  showToast(`Restore selesai! ${sukses} tabel berhasil`,'success');
  btn.disabled=false;
  _restoreData=null;
  document.getElementById('restore-file').value='';
}

async function init(){
  await initIDB();
  // Cek session tersimpan
  const saved=localStorage.getItem('wg_user');
  if(saved){
    currentUser=JSON.parse(saved);
    // Jika online, verifikasi session masih valid
    if(navigator.onLine){
      try{
        const{data:rows}=await sb.from('app_users').select('id,aktif').eq('id',currentUser.id).limit(1);
        const row=Array.isArray(rows)&&rows.length>0?rows[0]:null;
        if(!row||row.aktif===false){
          localStorage.removeItem('wg_user');

          return;
        }
      }catch(e){}
    }
    startApp();
  }
  // Service Worker
  registerSW();
}

// ============================================================
// SERVICE WORKER — Cache-only (tanpa blob/data URI)
// ============================================================
function registerSW(){
  if(!('serviceWorker' in navigator)) return;
  if(!('caches' in window)) return;
  // Cache halaman ini langsung via Cache API (tanpa SW file terpisah)
  cacheShell();
  window.addEventListener('load', cacheShell);
}

async function cacheShell(){
  try{
    const CACHE='wasgarage-manado-v1';
    const cache=await caches.open(CACHE);
    const url=location.href.split('?')[0].split('#')[0];
    try{
      const r=await fetch(url,{cache:'no-cache'});
      if(r.ok) await cache.put(url,r);
    }catch(e){}
    // Cache CDN assets
    const assets=[
      'https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css',
      'https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=DM+Sans:wght@400;500;600&display=swap'
    ];
    for(const a of assets){
      try{const r=await fetch(a,{mode:'no-cors'});await cache.put(a,r);}catch(e){}
    }
  }catch(e){}
}
