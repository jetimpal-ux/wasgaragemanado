<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<meta name="theme-color" content="#c2570a"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<title>WAS GARAGE MANADO</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css"/>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#f5f0eb;--bg2:#fff;--bg3:#fdf6ee;--sidebar:#1a0f00;
  --orange:#c2570a;--orange2:#e06d1a;--orange-dim:rgba(194,87,10,.12);
  --brown:#5c3317;--brown2:#3d2009;
  --text:#1a0f00;--text2:#5c3317;--text3:#a07850;
  --border:#e8d8c4;--border2:#d4b896;
  --green:#2d7a3a;--red:#c0392b;--blue:#1a5c99;--yellow:#b8860b;
  --input-bg:#fffaf5;
  --shadow:0 2px 12px rgba(92,51,23,.10);
  --shadow2:0 4px 24px rgba(92,51,23,.16);
  --radius:10px;--radius2:14px;
  --font-body:'DM Sans',sans-serif;
  --font-display:'Sora',sans-serif;
  --sidebar-w:230px;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;font-family:var(--font-body);background:var(--bg);color:var(--text);font-size:14px;}
a{color:inherit;text-decoration:none;}
button{cursor:pointer;font-family:var(--font-body);}
input,select,textarea{font-family:var(--font-body);}

/* ── SCROLLBAR ── */
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:10px;}

/* ── LAYOUT ── */
#app{display:flex;height:100vh;overflow:hidden;}
#sidebar{width:var(--sidebar-w);background:var(--sidebar);display:flex;flex-direction:column;overflow-y:auto;flex-shrink:0;transition:width .2s;}
#sidebar.collapsed{width:56px;}
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;}
#topbar{height:56px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;padding:0 16px;flex-shrink:0;box-shadow:var(--shadow);}
#content{flex:1;overflow-y:auto;padding:20px;}

/* ── SIDEBAR ── */
.sb-logo{padding:18px 16px 14px;display:flex;align-items:center;gap:10px;border-bottom:1px solid rgba(255,255,255,.08);}
.sb-logo-icon{width:34px;height:34px;background:var(--orange);border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.sb-logo-text{font-family:var(--font-display);font-weight:800;font-size:13px;color:#fff;line-height:1.2;}
.sb-logo-sub{font-size:9px;color:rgba(255,255,255,.45);font-weight:400;letter-spacing:.5px;text-transform:uppercase;}
.nav-group-label{font-size:9px;letter-spacing:1.2px;text-transform:uppercase;color:rgba(255,255,255,.3);padding:14px 16px 4px;font-weight:600;}
.nav-item{display:flex;align-items:center;gap:10px;padding:8px 14px;color:rgba(255,255,255,.65);border-radius:8px;margin:1px 8px;cursor:pointer;font-size:13px;font-weight:500;transition:all .15s;}
.nav-item:hover{background:rgba(255,255,255,.07);color:#fff;}
.nav-item.active{background:var(--orange);color:#fff;box-shadow:0 2px 8px rgba(194,87,10,.4);}
.nav-item i{font-size:16px;flex-shrink:0;width:20px;text-align:center;}
.nav-label{white-space:nowrap;overflow:hidden;}
.sb-user{padding:12px 14px;border-top:1px solid rgba(255,255,255,.08);display:flex;align-items:center;gap:8px;margin-top:auto;}
.sb-user-av{width:30px;height:30px;border-radius:50%;background:var(--orange);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;color:#fff;flex-shrink:0;}
.sb-user-info{flex:1;overflow:hidden;}
.sb-user-name{font-size:12px;font-weight:600;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.sb-user-role{font-size:10px;color:rgba(255,255,255,.4);}

/* ── TOPBAR ── */
#topbar-title{font-family:var(--font-display);font-weight:700;font-size:16px;flex:1;}
.topbar-badge{display:flex;align-items:center;gap:6px;background:var(--bg3);border:1px solid var(--border);border-radius:20px;padding:4px 10px;font-size:12px;font-weight:500;}
.dot-online{width:8px;height:8px;border-radius:50%;background:var(--green);flex-shrink:0;}
.dot-offline{width:8px;height:8px;border-radius:50%;background:var(--red);flex-shrink:0;}
.topbar-btn{width:34px;height:34px;border-radius:8px;border:1px solid var(--border);background:var(--bg2);display:flex;align-items:center;justify-content:center;font-size:16px;color:var(--text2);transition:all .15s;}
.topbar-btn:hover{background:var(--bg3);color:var(--orange);}
.sync-badge{position:relative;}
.sync-count{position:absolute;top:-4px;right:-4px;background:var(--red);color:#fff;font-size:9px;font-weight:700;min-width:16px;height:16px;border-radius:8px;display:flex;align-items:center;justify-content:center;padding:0 3px;}

/* ── OFFLINE BAR ── */
#offline-bar{background:linear-gradient(90deg,var(--red),#c0392b);color:#fff;padding:7px 16px;font-size:12px;font-weight:500;display:none;align-items:center;gap:8px;flex-shrink:0;}
#offline-bar.show{display:flex;}

/* ── PAGE HEADER ── */
.page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;gap:12px;flex-wrap:wrap;}
.page-title{font-family:var(--font-display);font-weight:700;font-size:20px;display:flex;align-items:center;gap:8px;}
.page-title i{color:var(--orange);}

/* ── CARDS ── */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:14px;margin-bottom:20px;}
.stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius2);padding:16px;position:relative;overflow:hidden;}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;}
.stat-card.orange::before{background:var(--orange);}
.stat-card.brown::before{background:var(--brown);}
.stat-card.green::before{background:var(--green);}
.stat-card.red::before{background:var(--red);}
.stat-card.blue::before{background:var(--blue);}
.stat-card.yellow::before{background:var(--yellow);}
.stat-label{font-size:11px;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;}
.stat-val{font-family:var(--font-display);font-weight:700;font-size:20px;color:var(--text);}
.stat-sub{font-size:11px;color:var(--text3);margin-top:4px;}
.stat-icon{position:absolute;right:12px;top:50%;transform:translateY(-50%);font-size:32px;color:var(--border2);opacity:.6;}

/* ── TABLE ── */
.table-wrap{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius2);overflow:hidden;margin-bottom:16px;}
table{width:100%;border-collapse:collapse;}
thead{background:var(--bg3);}
th{padding:10px 12px;text-align:left;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--text3);border-bottom:1px solid var(--border);white-space:nowrap;}
td{padding:10px 12px;border-bottom:1px solid var(--border);font-size:13px;vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:var(--bg3);}
.table-empty{text-align:center;padding:40px!important;color:var(--text3);}
.table-empty i{display:block;font-size:32px;margin-bottom:8px;opacity:.4;}
.table-actions{display:flex;gap:6px;align-items:center;}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border-radius:8px;font-size:13px;font-weight:600;border:none;transition:all .15s;white-space:nowrap;}
.btn i{font-size:15px;}
.btn-primary{background:var(--orange);color:#fff;}
.btn-primary:hover{background:var(--orange2);}
.btn-outline{background:transparent;color:var(--text2);border:1.5px solid var(--border2);}
.btn-outline:hover{background:var(--bg3);border-color:var(--orange);color:var(--orange);}
.btn-danger{background:var(--red);color:#fff;}
.btn-danger:hover{background:#a93226;}
.btn-success{background:var(--green);color:#fff;}
.btn-sm{padding:5px 10px;font-size:12px;}
.btn-xs{padding:3px 8px;font-size:11px;border-radius:6px;}
.btn-icon{padding:6px;border-radius:7px;}

/* ── FORM ── */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.form-full{grid-column:1/-1;}
.form-group{display:flex;flex-direction:column;gap:5px;}
.form-label{font-size:12px;font-weight:600;color:var(--text2);}
.req{color:var(--red);}
.form-input{border:1.5px solid var(--border);border-radius:8px;padding:8px 10px;font-size:13px;background:var(--input-bg);color:var(--text);outline:none;transition:border .15s;width:100%;}
.form-input:focus{border-color:var(--orange);}
.form-input:disabled{background:var(--bg3);color:var(--text3);}
textarea.form-input{resize:vertical;min-height:72px;}

/* ── MODAL ── */
.modal-overlay{position:fixed;inset:0;background:rgba(26,15,0,.5);display:none;align-items:center;justify-content:center;z-index:1000;padding:16px;backdrop-filter:blur(2px);}
.modal-overlay.open{display:flex;}
.modal{background:var(--bg2);border-radius:var(--radius2);width:100%;max-width:600px;max-height:90vh;overflow-y:auto;box-shadow:var(--shadow2);}
.modal-lg{max-width:860px;}
.modal-sm{max-width:400px;}
.modal-header{padding:16px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--bg2);z-index:1;}
.modal-title{font-family:var(--font-display);font-weight:700;font-size:15px;}
.modal-close{width:28px;height:28px;border-radius:6px;border:none;background:var(--bg3);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text3);}
.modal-close:hover{background:var(--red);color:#fff;}
.modal-body{padding:18px;}
.modal-footer{padding:14px 18px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px;}

/* ── BADGE ── */
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600;}
.badge-orange{background:var(--orange-dim);color:var(--orange);}
.badge-green{background:rgba(45,122,58,.12);color:var(--green);}
.badge-red{background:rgba(192,57,43,.12);color:var(--red);}
.badge-gray{background:var(--bg3);color:var(--text3);}
.badge-blue{background:rgba(26,92,153,.12);color:var(--blue);}
.badge-brown{background:rgba(92,51,23,.12);color:var(--brown);}

/* ── TABS ── */
.tabs{display:flex;gap:0;border-bottom:2px solid var(--border);margin-bottom:16px;}
.tab{padding:8px 16px;font-size:13px;font-weight:600;color:var(--text3);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .15s;}
.tab.active{color:var(--orange);border-bottom-color:var(--orange);}
.tab:hover:not(.active){color:var(--text2);}

/* ── SEARCH BAR ── */
.search-row{display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap;align-items:center;}
.search-input-wrap{position:relative;flex:1;min-width:200px;}
.search-input-wrap i{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:15px;}
.search-input{width:100%;padding:8px 10px 8px 34px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;background:var(--input-bg);outline:none;}
.search-input:focus{border-color:var(--orange);}

/* ── TOAST ── */
#toast{position:fixed;bottom:20px;right:20px;z-index:9999;display:flex;flex-direction:column;gap:8px;}
.toast-item{padding:12px 16px;border-radius:10px;font-size:13px;font-weight:500;color:#fff;box-shadow:var(--shadow2);display:flex;align-items:center;gap:8px;animation:slideUp .2s ease;max-width:320px;}
.toast-success{background:var(--green);}
.toast-error{background:var(--red);}
.toast-info{background:var(--brown);}
@keyframes slideUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* ── LOADING ── */
#loading-overlay{position:fixed;inset:0;background:rgba(26,15,0,.35);z-index:9998;display:none;align-items:center;justify-content:center;}
#loading-overlay.show{display:flex;}
.spinner{width:40px;height:40px;border:3px solid rgba(255,255,255,.2);border-top-color:var(--orange);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── PRINT ── */
#print-area{display:none;}
@media print{
  #app{display:none!important;}
  #login-page{display:none!important;}
  #print-area{display:block!important;}
  .no-print{display:none!important;}
  #toast{display:none!important;}
  #loading-overlay{display:none!important;}
  .modal-overlay{display:none!important;}
}

/* ── MISC ── */
.section-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.section-hdr h2{font-family:var(--font-display);font-weight:700;font-size:15px;display:flex;align-items:center;gap:6px;}
.section-hdr h2 i{color:var(--orange);}
.divider{height:1px;background:var(--border);margin:14px 0;}
code{font-family:monospace;background:var(--bg3);padding:1px 6px;border-radius:4px;font-size:12px;}
.text-orange{color:var(--orange);}
.text-green{color:var(--green);}
.text-red{color:var(--red);}
.fw-bold{font-weight:700;}
.text-sm{font-size:12px;}
.text-xs{font-size:11px;}
.gap-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}

/* ── WO PARTS TABLE ── */
.parts-table{width:100%;border-collapse:collapse;font-size:12px;}
.parts-table th{background:var(--bg3);padding:7px 8px;text-align:left;font-weight:700;font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:var(--text3);}
.parts-table td{padding:6px 8px;border-bottom:1px solid var(--border);}
.parts-table input{border:1px solid var(--border);border-radius:6px;padding:4px 6px;font-size:12px;background:var(--input-bg);width:100%;}
.parts-table input:focus{border-color:var(--orange);outline:none;}

/* ── NOTA CETAK ── */
.nota{font-family:'DM Sans',sans-serif;max-width:320px;margin:0 auto;padding:12px;font-size:12px;}
.nota-title{font-family:'Sora',sans-serif;font-weight:800;font-size:16px;text-align:center;}
.nota-sub{text-align:center;font-size:11px;color:#555;margin-bottom:6px;}
.nota-divider{border:none;border-top:1px dashed #999;margin:6px 0;}
.nota-row{display:flex;justify-content:space-between;margin-bottom:3px;}
.nota-row .label{color:#555;}
.nota-items{width:100%;border-collapse:collapse;margin:6px 0;}
.nota-items td{padding:3px 0;font-size:11px;}
.nota-items .nama{width:60%;}
.nota-total{font-weight:700;font-size:13px;border-top:1px solid #999;padding-top:4px;margin-top:4px;}
.nota-footer{text-align:center;font-size:10px;color:#777;margin-top:8px;}

/* ── RESPONSIVE MOBILE ── */
@media(max-width:768px){
  /* Sidebar */
  :root{--sidebar-w:260px;}
  #sidebar{position:fixed;left:0;top:0;bottom:0;z-index:200;transform:translateX(-100%);transition:transform .25s;width:var(--sidebar-w)!important;}
  #sidebar.mobile-open{transform:translateX(0);box-shadow:4px 0 20px rgba(0,0,0,.4);}

  /* Overlay saat sidebar terbuka */
  #sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:199;}
  #sidebar-overlay.show{display:block;}

  /* Topbar */
  #topbar{padding:0 10px;gap:6px;}
  #btn-menu{display:flex!important;}
  #topbar-title{font-size:14px;}
  .topbar-badge span{display:none;}

  /* Content */
  #content{padding:12px;}

  /* Grid */
  .stats-grid{grid-template-columns:1fr 1fr;gap:10px;}
  .form-grid{grid-template-columns:1fr!important;}
  .form-full{grid-column:1!important;}

  /* Tabel — scroll horizontal */
  .table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;}
  table{min-width:500px;}
  th,td{padding:8px 8px;font-size:12px;}

  /* Modal */
  .modal-overlay{padding:8px;align-items:flex-end;}
  .modal{max-height:92vh;border-radius:16px 16px 0 0;margin:0;}
  .modal-lg{max-width:100%!important;}
  .modal-sm{max-width:100%!important;}
  .modal-body{padding:14px;}
  .modal-footer{padding:10px 14px;flex-wrap:wrap;gap:6px;}
  .modal-footer .btn{flex:1;justify-content:center;}

  /* Buttons */
  .btn{padding:7px 12px;font-size:12px;}
  .page-header{flex-wrap:wrap;gap:8px;}
  .page-title{font-size:16px;}

  /* Parts table di WO/Penjualan */
  .parts-table{min-width:400px;}

  /* Search row */
  .search-row{gap:6px;}
  .search-input-wrap{min-width:100%;}

  /* Tabs */
  .tabs{overflow-x:auto;white-space:nowrap;padding-bottom:2px;}
  .tab{padding:7px 12px;font-size:12px;}

  /* Dashboard grid 2 kolom */
  #dash-stats .stat-card{padding:12px;}
  .stat-val{font-size:16px;}

  /* Login box */
  .login-box{padding:24px 18px;border-radius:16px;}
  .login-title{font-size:18px;}
}

@media(max-width:400px){
  .stats-grid{grid-template-columns:1fr;}
  #topbar-title{font-size:13px;max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
}

/* ── LOGIN PAGE ── */
#login-page{display:none;position:fixed;inset:0;background:var(--sidebar);align-items:center;justify-content:center;z-index:9999;}
#login-page.show{display:flex;}
.login-box{background:var(--bg2);border-radius:20px;padding:36px 32px;width:100%;max-width:380px;box-shadow:0 20px 60px rgba(0,0,0,.4);}
.login-logo{text-align:center;margin-bottom:24px;}
.login-logo-icon{width:60px;height:60px;background:var(--orange);border-radius:16px;display:inline-flex;align-items:center;justify-content:center;margin-bottom:10px;}
.login-logo-icon i{font-size:32px;color:#fff;}
.login-title{font-family:var(--font-display);font-weight:800;font-size:22px;color:var(--text);}
.login-sub{font-size:12px;color:var(--text3);margin-top:2px;}
</style>
</head>
<body>
<!-- LOGIN PAGE -->
<div id="login-page" class="show">
  <div class="login-box">
    <div class="login-logo">
      <div class="login-logo-icon"><i class="ti ti-tool"></i></div>
      <div class="login-title">WAS GARAGE</div>
      <div class="login-sub">MANADO — Sistem Operasional Bengkel by.Jefmanado</div>
    </div>

    <div class="form-group" style="margin-bottom:12px">
      <label class="form-label">Username</label>
      <input id="login-user" class="form-input" placeholder="Masukkan username..." onkeydown="if(event.key==='Enter')doLogin()"/>
    </div>
    <div class="form-group" style="margin-bottom:16px">
      <label class="form-label">Password</label>
      <input id="login-pass" class="form-input" type="password" placeholder="Masukkan password..." onkeydown="if(event.key==='Enter')doLogin()"/>
    </div>
    <button class="btn btn-primary" style="width:100%;justify-content:center;padding:11px" onclick="doLogin()">
      <i class="ti ti-login"></i> Masuk
    </button>
    <div id="login-err" style="color:var(--red);font-size:12px;text-align:center;margin-top:10px;display:none"></div>

  </div>
</div>

<!-- MAIN APP -->
<div id="app" style="display:none">
  <!-- SIDEBAR -->
  <div id="sidebar">
    <div class="sb-logo">
      <div class="sb-logo-icon"><i class="ti ti-tool" style="color:#fff;font-size:18px"></i></div>
      <div>
        <div class="sb-logo-text">WAS GARAGE</div>
        <div class="sb-logo-sub">SARIO MANADO @Je.V.26.3</div>
      </div>
    </div>
    <nav id="nav"></nav>
    <div class="sb-user">
      <div class="sb-user-av" id="sb-av">O</div>
      <div class="sb-user-info">
        <div class="sb-user-name" id="sb-name">Owner</div>
        <div class="sb-user-role" id="sb-role">Owner</div>
      </div>
      <button class="topbar-btn" style="background:transparent;border:none;color:rgba(255,255,255,.4)" onclick="doLogout()" title="Logout"><i class="ti ti-logout"></i></button>
    </div>
  </div>

  <!-- MAIN -->
  <div id="main">
    <div id="offline-bar">
      <i class="ti ti-wifi-off"></i>
      <span>Mode Offline — data tersimpan lokal, sync otomatis saat online</span>
      <span id="pending-count" style="background:rgba(255,255,255,.2);padding:2px 8px;border-radius:10px;margin-left:auto;font-size:11px"></span>
    </div>
    <div id="topbar">
      <button class="topbar-btn" onclick="toggleSidebar()" style="display:none" id="btn-menu"><i class="ti ti-menu-2"></i></button>
      <div id="topbar-title">Dashboard</div>
      <div class="topbar-badge" id="badge-online">
        <div class="dot-online" id="dot-status"></div>
        <span id="status-text">Online</span>
      </div>
      <button class="topbar-btn sync-badge" onclick="syncNow()" title="Sync data">
        <i class="ti ti-refresh"></i>

function sbQuery(tbl, cols='*'){
  const state={tbl,cols,filters:[],_order:null,_limit:null,_single:false,_maybe:false};

  const q={
    eq:(c,v)=>{state.filters.push(`${c}=eq.${encodeURIComponent(v)}`);return q;},
    neq:(c,v)=>{state.filters.push(`${c}=neq.${encodeURIComponent(v)}`);return q;},
    gt:(c,v)=>{state.filters.push(`${c}=gt.${encodeURIComponent(v)}`);return q;},
    gte:(c,v)=>{state.filters.push(`${c}=gte.${encodeURIComponent(v)}`);return q;},
    lt:(c,v)=>{state.filters.push(`${c}=lt.${encodeURIComponent(v)}`);return q;},
    lte:(c,v)=>{state.filters.push(`${c}=lte.${encodeURIComponent(v)}`);return q;},
    in:(c,v)=>{state.filters.push(`${c}=in.(${Array.isArray(v)?v.join(','):v})`);return q;},
    order:(c,o)=>{state._order=`${c}.${o?.ascending!==false?'asc':'desc'}`;return q;},
    limit:(n)=>{state._limit=n;return q;},
    single:()=>{state._single=true;return q;},
    maybeSingle:()=>{state._single=true;state._maybe=true;return q;},
    then:(fn,rej)=>sbExec(state).then(fn,rej),
    catch:(fn)=>sbExec(state).catch(fn),
  };
  return q;
}

async function sbExec(state){
  if(!SUPABASE_URL||SUPABASE_URL==='YOUR_SUPABASE_URL')
    return{data:null,error:{message:'⚠️ Supabase URL belum diisi di konfigurasi'}};
  let url=`${SUPABASE_URL}/rest/v1/${state.tbl}?select=${encodeURIComponent(state.cols)}`;
  for(const f of state.filters) url+=`&${f}`;
  if(state._order) url+=`&order=${state._order}`;
  if(state._limit) url+=`&limit=${state._limit}`;
  const headers={'apikey':SUPABASE_ANON_KEY,'Authorization':'Bearer '+SUPABASE_ANON_KEY};
  if(state._single) headers['Accept']='application/vnd.pgrst.object+json';
  try{
    const r=await fetch(url,{headers});
    if(r.status===406) return{data:state._single?null:[],error:null};
    if(r.status===404) return{data:null,error:null};
    const d=await r.json().catch(()=>({}));
    if(!r.ok) return{data:null,error:{message:d?.message||d?.hint||JSON.stringify(d)}};
    return{data:d,error:null};
  }catch(e){return{data:null,error:{message:e.message}};}
}

async function sbMut(tbl,method,body,filter=null,extra=''){
  if(!SUPABASE_URL||SUPABASE_URL==='YOUR_SUPABASE_URL')
    return{data:null,error:{message:'⚠️ Supabase URL belum diisi di konfigurasi'}};
  let url=`${SUPABASE_URL}/rest/v1/${tbl}`;
  if(extra) url+=`?${extra}`;
  if(filter) url+=(extra?'&':'?')+filter;
  const headers={'apikey':SUPABASE_ANON_KEY,'Authorization':'Bearer '+SUPABASE_ANON_KEY,
    'Content-Type':'application/json','Prefer':'return=representation'};
  try{
    const r=await fetch(url,{method,headers,...(body?{body:JSON.stringify(body)}:{})});
    if(method==='DELETE'&&r.status===204) return{data:null,error:null};
    const d=await r.json().catch(()=>({}));
    if(!r.ok) return{data:null,error:{message:d?.message||d?.hint||JSON.stringify(d)}};
    return{data:Array.isArray(d)?d[0]:d,error:null};
  }catch(e){return{data:null,error:{message:e.message}};}
}

const sb={
  from:tbl=>({
    select:(cols='*')=>sbQuery(tbl,cols),
    insert:(body)=>sbMut(tbl,'POST',Array.isArray(body)?body:[body],null,''),
    update:(body)=>({eq:(c,v)=>sbMut(tbl,'PATCH',body,`${c}=eq.${encodeURIComponent(v)}`)}),
    delete:()=>({eq:(c,v)=>sbMut(tbl,'DELETE',null,`${c}=eq.${encodeURIComponent(v)}`)}),
    upsert:(body)=>sbMut(tbl,'POST',body,null,'on_conflict=id'),
  })
};

async function autoNo(prefix,table,col){
  try{
    const y=new Date().getFullYear().toString().slice(2);
    const m=String(new Date().getMonth()+1).padStart(2,'0');
    const pattern=`${prefix}${y}${m}`;
    const {data}=await sb.from(table).select(col).order(col,{ascending:false}).limit(1);
    if(!data||(Array.isArray(data)&&!data.length)) return `${pattern}0001`;
    const last=(Array.isArray(data)?data[0]:data)[col]||'';
    const num=parseInt(last.slice(-4)||'0')+1;
    return `${pattern}${String(num).padStart(4,'0')}`;
  }catch(e){
    return `${prefix}${Date.now().toString().slice(-6)}`;
  }
}

// INDEXEDDB — Offline Storage
// ============================================================
let idbDb=null;
function initIDB(){
  return new Promise((res,rej)=>{
    const req=indexedDB.open('wasgarage_manado',3);
    req.onupgradeneeded=e=>{
      const db=e.target.result;
      if(!db.objectStoreNames.contains('queue')) db.createObjectStore('queue',{keyPath:'id'});
      if(!db.objectStoreNames.contains('tbl_cache')){
        const s=db.createObjectStore('tbl_cache',{keyPath:'key'});
        s.createIndex('tbl','tbl',{unique:false});
      }
    };
    req.onsuccess=e=>{idbDb=e.target.result;res();};
    req.onerror=e=>rej(e);
  });
}

function idbTx(store,mode='readonly'){
  return idbDb?.transaction(store,mode).objectStore(store);
}

async function idbGet(store,key){
  return new Promise((res)=>{
    const r=idbTx(store).get(key);
    r.onsuccess=e=>res(e.target.result);
    r.onerror=()=>res(null);
  });
}

async function idbPut(store,val){
  return new Promise((res)=>{
    const r=idbTx(store,'readwrite').put(val);
    r.onsuccess=()=>res(true);
    r.onerror=()=>res(false);
  });
}

async function idbDelete(store,key){
  return new Promise((res)=>{
    const r=idbTx(store,'readwrite').delete(key);
    r.onsuccess=()=>res(true);
    r.onerror=()=>res(false);
  });
}

async function idbGetAll(store){
  return new Promise((res)=>{
    const r=idbTx(store).getAll();
    r.onsuccess=e=>res(e.target.result||[]);
    r.onerror=()=>res([]);
  });
}

async function getCache(tbl){

// QUEUE — Offline Operations
// ============================================================
async function enqueue(tabel,op,data){
  await idbPut('queue',{id:uid(),tabel,op,data,ts:nowTs(),status:'pending'});
  await applyLocal(tabel,op,data);
  updatePendingBadge();
}

async function updatePendingBadge(){
  const q=await idbGetAll('queue');
  const n=q.filter(x=>x.status==='pending').length;
  const badge=document.getElementById('sync-badge');
  const pend=document.getElementById('pending-count');
  if(badge){badge.style.display=n?'flex':'none';badge.textContent=n;}
  if(pend) pend.textContent=n?(n+' pending'):'';
}

async function syncQueue(){
  if(!isOnline) return;
  const q=await idbGetAll('queue');
  const pending=q.filter(x=>x.status==='pending');
  if(!pending.length) return;
  for(const item of pending){
    try{
      let ok=false;
      if(item.op==='INSERT'){const r=await sb.from(item.tabel).insert(item.data);ok=!r.error;}
      else if(item.op==='UPDATE'){const r=await sb.from(item.tabel).update(item.data.payload).eq('id',item.data.id);ok=!r.error;}
      else if(item.op==='DELETE'){const r=await sb.from(item.tabel).delete().eq('id',item.data.id);ok=!r.error;}
      if(ok){
        await idbDelete('queue',item.id);
        await clearCache(item.tabel);
      }
    }catch(e){}
  }
  await updatePendingBadge();
}

  if(!isOnline){showToast('Tidak ada koneksi internet','error');return;}
  showToast('Sinkronisasi...','info',1500);
  await syncQueue();

}

// ============================================================
// DATABASE OPERATION — online/offline aware
// ============================================================
async function dbOp(tabel,op,data){
  if(isOnline){
    try{
      let res,err;
      if(op==='INSERT'){const r=await sb.from(tabel).insert(data);err=r.error;res=r.data;}
      else if(op==='UPDATE'){const r=await sb.from(tabel).update(data.payload).eq('id',data.id);err=r.error;res=r.data;}
      else if(op==='DELETE'){const r=await sb.from(tabel).delete().eq('id',data.id);err=r.error;res=r.data;}
      if(err){
        // Network error → queue
        const isNet=err.message?.includes('fetch')||err.message?.includes('network')||!navigator.onLine;
        if(isNet){await enqueue(tabel,op,data);return data;}
        throw new Error(err.message||JSON.stringify(err));
      }
      await clearCache(tabel);
      return res||data;
    }catch(e){
      const isNet=!navigator.onLine||e.message?.includes('fetch')||e.message?.includes('Failed');
      if(isNet){await enqueue(tabel,op,data);return data;}
      throw e;
    }
  }else{
    await enqueue(tabel,op,data);
    return data;
  }
}

// Apply operation to local cache immediately (for offline display)
async function applyLocal(tabel,op,data){
  const rows=await getCache(tabel)||[];
  let updated;
  if(op==='INSERT') updated=rows.find(r=>r.id===data.id)?rows:[...rows,data];
  else if(op==='UPDATE') updated=rows.map(r=>r.id===data.id?{...r,...data.payload}:r);
  else if(op==='DELETE') updated=rows.filter(r=>r.id!==data.id);
  else updated=rows;
  await setCache(tabel,updated);
}

// Load table with online/offline fallback + queue merge
async function loadTbl(tabel,qFn=null,cacheKey=null){
  const key=cacheKey||tabel;
  if(isOnline){
    try{
      const q=qFn?qFn(sb.from(tabel).select('*')):sb.from(tabel).select('*');
      const {data,error}=await q;
      if(error) throw new Error(error.message);
      const result=data||[];
      await setCache(key,result);
      return await mergeQueue(key,result);
    }catch(e){
      const cached=await getCache(key)||[];
      return await mergeQueue(key,cached);
    }
  }else{
    const cached=await getCache(key)||[];
    return await mergeQueue(tabel,cached);
  }
}

async function mergeQueue(tabel,rows){
  const q=await idbGetAll('queue');
  const pending=q.filter(x=>x.tabel===tabel&&x.status==='pending');
  if(!pending.length) return rows;
  let result=[...rows];
  for(const item of pending){
    if(item.op==='INSERT'&&!result.find(r=>r.id===item.data.id)) result.push(item.data);
    else if(item.op==='UPDATE') result=result.map(r=>r.id===item.data.id?{...r,...item.data.payload}:r);
    else if(item.op==='DELETE') result=result.filter(r=>r.id!==item.data.id);
  }
  return result;
}

// Read single row with offline fallback
async function dbGet(tabel,id){
  if(isOnline){
    try{const {data}=await sb.from(tabel).select('*').eq('id',id).single();if(data) return data;}catch(e){}
  }
  const rows=await getCache(tabel)||[];
  return rows.find(r=>r.id===id)||null;
}

let currentUser=null;

async function doLogin(){
  const u=document.getElementById('login-user').value.trim();
  const p=document.getElementById('login-pass').value;
  if(!u||!p){showLoginErr('Username dan password wajib diisi');return;}

  // Validasi konfigurasi Supabase
  if(SUPABASE_URL==='YOUR_SUPABASE_URL'||!SUPABASE_URL||SUPABASE_ANON_KEY==='YOUR_SUPABASE_ANON_KEY'||!SUPABASE_ANON_KEY){
    showLoginErr('⚠️ Supabase belum dikonfigurasi! Buka file HTML dan isi SUPABASE_URL dan SUPABASE_ANON_KEY terlebih dahulu.');
    return;
  }

  showLoading(true);
  try{
    // Query semua user dulu, filter manual di client (hindari masalah RLS/filter)
    console.log('[Login] Mencoba login:', u);
    const {data:allRows, error}=await sb.from('app_users').select('*').limit(50);
    console.log('[Login] Response:', {allRows, error});

    if(error){
      const msg=error.message||JSON.stringify(error);
      console.error('[Login] Error:', msg);
      if(msg.includes('JWT')||msg.includes('apikey')||msg.includes('Invalid')){
        showLoginErr('❌ API Key tidak valid. Periksa SUPABASE_ANON_KEY.');
        showLoading(false);return;
      }
      if(!navigator.onLine||msg.includes('fetch')||msg.includes('Failed')){
        const saved=localStorage.getItem('wg_user');
        if(saved){currentUser=JSON.parse(saved);showToast('Login offline','info');startApp();showLoading(false);return;}
        showLoginErr('Tidak ada koneksi internet.');showLoading(false);return;
      }
      showLoginErr('Error Supabase: '+msg);showLoading(false);return;
    }

    if(!allRows||!Array.isArray(allRows)||allRows.length===0){
      showLoginErr('Tabel app_users kosong. Jalankan SQL setup terlebih dahulu di Supabase.');
      showLoading(false);return;
    }

    // Filter manual di client
    const data=allRows.find(r=>r.username===u||r.username?.toLowerCase()===u.toLowerCase());
    if(!data){
      showLoginErr(`Username "${u}" tidak ditemukan. (Total user: ${allRows.length})`);
      showLoading(false);return;
    }
    if(data.aktif===false){showLoginErr('Akun dinonaktifkan.');showLoading(false);return;}
    const match=data.password===p||data.password===await hashPwd(p);
    if(!match){showLoginErr('Password salah.');showLoading(false);return;}
    currentUser=data;
    localStorage.setItem('wg_user',JSON.stringify({id:data.id,username:data.username,nama:data.nama,role:data.role}));
    startApp();
  }catch(e){
    console.error('Login error:',e);
    // Coba offline login
    const saved=localStorage.getItem('wg_user');
    if(saved&&!navigator.onLine){
      currentUser=JSON.parse(saved);
      showToast('Login offline','info');
      startApp();
    }else{
      showLoginErr('Gagal terhubung ke server: '+e.message);
    }
  }
  showLoading(false);
}

async function hashPwd(pwd){
  const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(pwd));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

}

let currentPage='';

function buildNav(){
  const nav=document.getElementById('nav');
  let lastGroup=null, html='';
  for(const p of PAGES){
    if(!canAccess(p)) continue; // sembunyikan menu tidak punya akses
    if(p.group!==lastGroup){
      if(p.group) html+=`<div class="nav-group-label">${p.group}</div>`;
      lastGroup=p.group;
    }
    html+=`<div class="nav-item" id="nav-${p.id}" onclick="showPage('${p.id}')">
      <i class="ti ${p.icon}"></i>
      <span class="nav-label">${p.label}</span>
    </div>`;
  }
  nav.innerHTML=html;
}

function setActiveNav(id){
  document.querySelectorAll('.nav-item').forEach(el=>el.classList.remove('active'));
  const el=document.getElementById(`nav-${id}`);
  if(el) el.classList.add('active');
}

async function showPage(id,force=false){
  // Tutup sidebar otomatis di mobile
  if(window.innerWidth<=768){
    document.getElementById('sidebar')?.classList.remove('mobile-open');
    document.getElementById('sidebar-overlay')?.classList.remove('show');
    document.body.style.overflow='';
  }
  if(id===currentPage&&!force) return;
  // Cek akses berdasarkan role
  const p=PAGES.find(x=>x.id===id);
  if(p&&!canAccess(p)){
    document.getElementById('content').innerHTML=`
      <div style="text-align:center;padding:60px;color:var(--text3)">
        <i class="ti ti-lock" style="font-size:48px;color:var(--orange);display:block;margin-bottom:12px"></i>
        <div style="font-family:var(--font-display);font-size:18px;font-weight:700;margin-bottom:8px">Akses Ditolak</div>
        <div style="font-size:13px">Halaman <b>${p.label}</b> hanya dapat diakses oleh <b>Owner</b>.</div>
      </div>`;
    return;
  }
  currentPage=id;
  setActiveNav(id);
  document.getElementById('topbar-title').textContent=p?.label||id;
  document.getElementById('content').innerHTML='<div style="display:flex;align-items:center;justify-content:center;height:200px"><div class="spinner"></div></div>';
  try{
    await pages[id]?.();
  }catch(e){
    document.getElementById('content').innerHTML=`<div style="text-align:center;padding:40px;color:var(--red)"><i class="ti ti-alert-triangle" style="font-size:32px"></i><br>${e.message}</div>`;
    console.error(id,e);
  }
}

function toggleSidebar(){
  const sb=document.getElementById('sidebar');
  const ov=document.getElementById('sidebar-overlay');
  const isOpen=sb.classList.toggle('mobile-open');
  if(ov) ov.classList.toggle('show', isOpen);
  // Prevent body scroll saat sidebar terbuka
  document.body.style.overflow=isOpen?'hidden':'';
}

function renderPelRows(data){
  if(!data.length) return '<tr><td colspan="5" class="table-empty"><i class="ti ti-users-off"></i>Belum ada pelanggan</td></tr>';
  return data.map(p=>`<tr>
    <td style="font-weight:600">${p.nama}</td>
    <td>${p.telepon||'-'}</td>
    <td style="font-size:12px;color:var(--text3)">${p.alamat||'-'}</td>
    <td style="${Number(p.saldo_piutang)>0?'color:var(--red);font-weight:600':'color:var(--text3)'}">${fmt(p.saldo_piutang)}</td>
    <td><div class="table-actions">
      <button class="btn btn-outline btn-xs" onclick='editPelanggan(${JSON.stringify(p)})'><i class="ti ti-edit"></i></button>
      <button class="btn btn-danger btn-xs" onclick="delPelanggan('${p.id}','${p.nama}')"><i class="ti ti-trash"></i></button>
    </div></td>
  </tr>`).join('');
}

function filterPel(){
  const q=document.getElementById('cari-pel').value.toLowerCase();
  const filtered=window._pelData.filter(p=>(p.nama||'').toLowerCase().includes(q)||(p.telepon||'').includes(q));
  document.getElementById('body-pel').innerHTML=renderPelRows(filtered);
}

function editPelanggan(p){
  openModal('modal-pel');
  document.getElementById('f-pel-id').value=p.id;
  document.getElementById('f-pel-nama').value=p.nama||'';
  document.getElementById('f-pel-telp').value=p.telepon||'';
  document.getElementById('f-pel-email').value=p.email||'';
  document.getElementById('f-pel-alamat').value=p.alamat||'';
}

async function savePelanggan(){
  const nama=document.getElementById('f-pel-nama').value.trim();
  if(!nama){showToast('Nama wajib diisi','error');return;}
  const id=document.getElementById('f-pel-id').value||uid();
  const payload={id,nama,telepon:document.getElementById('f-pel-telp').value,email:document.getElementById('f-pel-email').value,alamat:document.getElementById('f-pel-alamat').value};
  showLoading(true);
  try{
    const isEdit=!!document.getElementById('f-pel-id').value;
    if(isEdit) await dbOp('pelanggan','UPDATE',{id,payload:{nama,telepon:payload.telepon,email:payload.email,alamat:payload.alamat}});
    else await dbOp('pelanggan','INSERT',payload);
    closeModal('modal-pel');
    showToast(isEdit?'Pelanggan diperbarui':'Pelanggan ditambahkan');
    document.getElementById('f-pel-id').value='';
    ['f-pel-nama','f-pel-telp','f-pel-email','f-pel-alamat'].forEach(i=>document.getElementById(i).value='');
    await showPage('pelanggan',true);
  }catch(e){showToast('Gagal: '+e.message,'error');}
  showLoading(false);
}

async function delPelanggan(id,nama){
  if(!await confirm2(`Hapus pelanggan "${nama}"?`)) return;
  showLoading(true);
  try{await dbOp('pelanggan','DELETE',{id});showToast('Pelanggan dihapus');await showPage('pelanggan',true);}
  catch(e){showToast('Gagal: '+e.message,'error');}
  showLoading(false);
}

async function loadKategori(){

function renderStokRows(data){

  return data.map(b=>`<tr>

    <td><span class="badge badge-brown">${b.kategori||'-'}</span></td>
    <td>${b.satuan||'pcs'}</td>

function filterStok(){
  const q=(document.getElementById('cari-brg').value||'').toLowerCase();
  const kat=document.getElementById('filter-kat').value;
  const f=window._stokData.filter(b=>
    (!q||(b.nama||'').toLowerCase().includes(q)||(b.kode||'').toLowerCase().includes(q))&&

function ensureBarangModal(){
  const katOpts=_katList.map(k=>`<option value="${k}">${k}</option>`).join('');

        <div class="form-group"><label class="form-label">Kategori

        </div>

          <select id="f-brg-sat" class="form-input"><option>pcs</option><option>liter</option><option>set</option><option>pasang</option><option>meter</option><option>kg</option><option>gram</option><option>unit</option></select>
        </div>
        <div class="form-group"><label class="form-label">Harga Beli</label><input id="f-brg-hb" class="form-input" type="number" min="0"/></div>
        <div class="form-group"><label class="form-label">Harga Jual <span class="req">*</span></label><input id="f-brg-hj" class="form-input" type="number" min="0"/></div>

        <div class="form-group"><label class="form-label">Stok Minimum</label><input id="f-brg-min" class="form-input" type="number" min="0" value="0"/></div>
        <div class="form-group form-full"><label class="form-label">Lokasi Rak</label><input id="f-brg-rak" class="form-input" placeholder="A1, B2..."/></div>
      </div>
      <input type="hidden" id="f-brg-id"/>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('modal-brg')">Batal</button>
      <button class="btn btn-primary" onclick="saveBarang()"><i class="ti ti-device-floppy"></i>Simpan</button>
    </div>
  </div>`);
}

async function tambahKategori(){
  const nama=prompt('Nama kategori baru:');
  if(!nama?.trim()) return;
  try{
    await dbOp('kategori_barang','INSERT',{id:uid(),nama:nama.trim()});
    _katList.push(nama.trim());
    // Update semua dropdown kategori
    const sel=document.getElementById('f-brg-kat');
    if(sel){const opt=document.createElement('option');opt.value=nama.trim();opt.textContent=nama.trim();sel.appendChild(opt);sel.value=nama.trim();}
    showToast('Kategori ditambahkan');
  }catch(e){
    // Jika tabel tidak ada, cukup tambah ke list lokal
    _katList.push(nama.trim());
    const sel=document.getElementById('f-brg-kat');
    if(sel){const opt=document.createElement('option');opt.value=nama.trim();opt.textContent=nama.trim();sel.appendChild(opt);sel.value=nama.trim();}
    showToast('Kategori ditambahkan (lokal)');
  }
}

function openBarang(b=null){
  ensureBarangModal();
  openModal('modal-brg');
  document.getElementById('f-brg-id').value=b?.id||'';
  document.getElementById('f-brg-kode').value=b?.kode||'';
  document.getElementById('f-brg-nama').value=b?.nama||'';
  document.getElementById('f-brg-kat').value=b?.kategori||(_katList[0]||'');
  document.getElementById('f-brg-sat').value=b?.satuan||'pcs';
  document.getElementById('f-brg-hb').value=b?.harga_beli||0;
  document.getElementById('f-brg-hj').value=b?.harga_jual||0;
  document.getElementById('f-brg-stok').value=b?.stok||0;
  document.getElementById('f-brg-min').value=b?.stok_minimum||0;
  document.getElementById('f-brg-rak').value=b?.lokasi_rak||'';
}

async function saveBarang(returnId=false){
  const nama=(document.getElementById('f-brg-nama').value||'').trim();
  if(!nama){showToast('Nama barang wajib diisi','error');return null;}
  const id=document.getElementById('f-brg-id').value||uid();
  const isEdit=!!document.getElementById('f-brg-id').value;
  const kode=document.getElementById('f-brg-kode').value||('BRG'+Date.now().toString().slice(-6));
  const payload={nama,kode,kategori:document.getElementById('f-brg-kat').value,satuan:document.getElementById('f-brg-sat').value,harga_beli:Number(document.getElementById('f-brg-hb').value)||0,harga_jual:Number(document.getElementById('f-brg-hj').value)||0,stok:Number(document.getElementById('f-brg-stok').value)||0,stok_minimum:Number(document.getElementById('f-brg-min').value)||0,lokasi_rak:document.getElementById('f-brg-rak').value};
  showLoading(true);
  try{
    if(isEdit) await dbOp('barang','UPDATE',{id,payload});
    else await dbOp('barang','INSERT',{id,...payload});
    if(!returnId){closeModal('modal-brg');showToast(isEdit?'Barang diperbarui':'Barang ditambahkan');if(currentPage==='stok') await showPage('stok',true);}
    showLoading(false);
    return id;
  }catch(e){showToast('Gagal: '+e.message,'error');showLoading(false);return null;}
}

async function delBarang(id,nama){
  if(!await confirm2(`Hapus barang "${nama}"?`)) return;
  showLoading(true);
  try{await dbOp('barang','DELETE',{id});showToast('Barang dihapus');await showPage('stok',true);}
  catch(e){showToast('Gagal: '+e.message,'error');}
  showLoading(false);
}

    <td><span class="badge ${w.status_bayar==='lunas'?'badge-green':w.status_bayar==='sebagian'?'badge-orange':'badge-red'}">${w.status_bayar||'belum'}</span></td>
    <td><div class="table-actions">
      <button class="btn btn-outline btn-xs" onclick="editWO('${w.id}')"><i class="ti ti-edit"></i></button>
      <button class="btn btn-outline btn-xs" onclick="cetakWOById('${w.id}')"><i class="ti ti-printer"></i></button>
      <button class="btn btn-danger btn-xs" onclick="delWO('${w.id}','${w.no_wo}')"><i class="ti ti-trash"></i></button>
    </div></td>
  </tr>`).join(''):'<tr><td colspan="10" class="table-empty"><i class="ti ti-engine-off"></i>Tidak ada Work Order</td></tr>'}</tbody></table></div>`;
}

          </select>
        </div>
        <div class="form-group"><label class="form-label">Pelanggan</label><input id="f-wo-pel" class="form-input" placeholder="Otomatis / manual" value="${wo?.nama_pelanggan||''}"/></div>
        <div class="form-group form-full"><label class="form-label">Mekanik <span style="font-size:10px;color:var(--text3)">(bisa lebih dari 1)</span></label>
          <div id="f-wo-mek-wrap" style="border:1.5px solid var(--border);border-radius:8px;padding:8px;min-height:38px;background:var(--input-bg);cursor:pointer" onclick="toggleMekDD()">
            <div id="f-wo-mek-tags" style="display:flex;flex-wrap:wrap;gap:4px"><span style="color:var(--text3);font-size:13px">-- Pilih Mekanik --</span></div>

      </div>
      <div style="overflow-x:auto"><table class="parts-table" id="tbl-parts">

          </select>
        </div>
        <div class="form-group"><label class="form-label">Terbayar (Rp)</label><input id="f-wo-bayar" class="form-input" type="number" value="${wo?.terbayar||0}" oninput="hitungTotalWO()"/></div>

      <button class="btn btn-primary" onclick="saveWO(true)"><i class="ti ti-printer"></i>Simpan & Cetak</button>

  if(wo?.kendaraan_id){

      document.removeEventListener('click',_c);

function toggleMekDD(){const dd=document.getElementById('f-wo-mek-dd');if(dd)dd.style.display=dd.style.display==='none'?'block':'none';}
function onMekChk(cb){if(cb.checked){if(!_woMekIds.includes(cb.value))_woMekIds.push(cb.value);}else{_woMekIds=_woMekIds.filter(x=>x!==cb.value);}renderMekTags();}
function removeMek(id){_woMekIds=_woMekIds.filter(x=>x!==id);const cb=document.querySelector(`#f-wo-mek-dd input[value="${id}"]`);if(cb)cb.checked=false;renderMekTags();}
function renderMekTags(){
  const el=document.getElementById('f-wo-mek-tags');if(!el)return;
  if(!_woMekIds.length){el.innerHTML='<span style="color:var(--text3);font-size:13px">-- Pilih Mekanik --</span>';return;}
  const allCbs=document.querySelectorAll('#f-wo-mek-dd input');
  const nMap={};allCbs.forEach(c=>nMap[c.value]=c.dataset.nama);
  el.innerHTML=_woMekIds.map(id=>`<span style="display:inline-flex;align-items:center;gap:4px;background:var(--orange);color:#fff;border-radius:5px;padding:2px 8px;font-size:12px">${nMap[id]||id}<i class="ti ti-x" style="cursor:pointer;font-size:11px" onclick="removeMek('${id}');event.stopPropagation()"></i></span>`).join('');
}

function onKendChange(){
  const sel=document.getElementById('f-wo-kend');
  const opt=sel?.selectedOptions[0];
  if(opt?.dataset.pelnama) document.getElementById('f-wo-pel').value=opt.dataset.pelnama;
}

function addWOPart(){
  _woParts.push({_id:uid(),barang_id:'',nama_barang:'',jumlah:1,satuan:'pcs',harga_jual:0,subtotal:0,is_non_gudang:true});
  renderWOParts();
}

function renderWOParts(){
  const tb=document.getElementById('body-parts');if(!tb)return;
  if(!_woParts.length){tb.innerHTML='<tr><td colspan="6" style="text-align:center;padding:12px;color:var(--text3);font-size:12px">Belum ada sparepart</td></tr>';hitungTotalWO();return;}
  tb.innerHTML=_woParts.map((p,i)=>`<tr>
    <td>
      <input list="brg-list-${i}" value="${p.nama_barang||''}" placeholder="Ketik nama / cari..." style="border:1px solid var(--border);border-radius:6px;padding:4px 6px;font-size:12px;width:100%;background:var(--input-bg)"
        onchange="onPartNamaChange(${i},this.value)" oninput="onPartNamaChange(${i},this.value)"/>
      <datalist id="brg-list-${i}">${(window._woBrg||[]).map(b=>`<option value="${b.nama}" data-id="${b.id}" data-hj="${b.harga_jual}" data-sat="${b.satuan}">${b.nama}</option>`).join('')}</datalist>
    </td>
    <td><input type="number" min="1" value="${p.jumlah||1}" style="border:1px solid var(--border);border-radius:6px;padding:4px;width:60px;font-size:12px;background:var(--input-bg)" onchange="_woParts[${i}].jumlah=Number(this.value);_woParts[${i}].subtotal=_woParts[${i}].jumlah*_woParts[${i}].harga_jual;renderWOParts()"/></td>
    <td><input value="${p.satuan||'pcs'}" style="border:1px solid var(--border);border-radius:6px;padding:4px;width:50px;font-size:12px;background:var(--input-bg)" onchange="_woParts[${i}].satuan=this.value"/></td>
    <td><input type="number" value="${p.harga_jual||0}" style="border:1px solid var(--border);border-radius:6px;padding:4px;width:90px;font-size:12px;background:var(--input-bg)" onchange="_woParts[${i}].harga_jual=Number(this.value);_woParts[${i}].subtotal=_woParts[${i}].jumlah*_woParts[${i}].harga_jual;renderWOParts()"/></td>
    <td style="font-weight:600;font-size:12px;color:var(--orange)">${fmt(p.subtotal)}</td>
    <td><button class="btn btn-danger btn-xs" onclick="_woParts.splice(${i},1);renderWOParts()"><i class="ti ti-x"></i></button></td>
  </tr>`).join('');
  hitungTotalWO();
}

function onPartNamaChange(i,val){
  const brg=(window._woBrg||[]).find(b=>b.nama===val);
  if(brg){_woParts[i].barang_id=brg.id;_woParts[i].harga_jual=brg.harga_jual;_woParts[i].satuan=brg.satuan;_woParts[i].is_non_gudang=false;}
  else{_woParts[i].barang_id='';_woParts[i].is_non_gudang=true;}
  _woParts[i].nama_barang=val;
  _woParts[i].subtotal=_woParts[i].jumlah*_woParts[i].harga_jual;
  renderWOParts();
}

function hitungTotalWO(){
  const subPart=_woParts.reduce((a,p)=>a+Number(p.subtotal||0),0);
  const jasa=Number(document.getElementById('f-wo-jasa')?.value||0);
  const diskon=Number(document.getElementById('f-wo-diskon')?.value||0);
  const total=subPart+jasa-diskon;
  const set=(id,v)=>{const el=document.getElementById(id);if(el)el.textContent=v;};
  set('sub-part',fmt(subPart));set('sub-jasa',fmt(jasa));set('sub-dis',fmt(diskon));set('total-wo',fmt(total));
}

async function saveWO(doCetak=false){
  const no=(document.getElementById('f-wo-no')?.value||'').trim();
  if(!no){showToast('No. WO wajib diisi','error');return;}
  const kendId=document.getElementById('f-wo-kend')?.value;
  if(!kendId){showToast('Pilih kendaraan terlebih dahulu','error');return;}
  const id=document.getElementById('f-wo-id').value||uid();
  const isEdit=!!document.getElementById('f-wo-id').value;
  const kend=(await loadTbl('kendaraan')).find(k=>k.id===kendId);
  const subPart=_woParts.reduce((a,p)=>a+Number(p.subtotal||0),0);
  const jasa=Number(document.getElementById('f-wo-jasa').value||0);
  const diskon=Number(document.getElementById('f-wo-diskon').value||0);
  const total=subPart+jasa-diskon;
  const terbayar=Number(document.getElementById('f-wo-bayar').value||0);
  const sisa=Math.max(0,total-terbayar);
  const metode=document.getElementById('f-wo-metode').value;
  const payload={
    no_wo:no,tanggal:document.getElementById('f-wo-tgl').value,
    kendaraan_id:kendId,no_plat:kend?.no_plat||'',
    nama_pelanggan:document.getElementById('f-wo-pel').value||'Umum',
    mekanik_id:_woMekIds[0]||null,
    mekanik_ids:_woMekIds.length?JSON.stringify(_woMekIds):null,
    nama_mekanik:_woMekIds.length?(document.querySelector(`#f-wo-mek-dd input[value="${_woMekIds[0]}"]`)?.dataset?.nama||_woMekIds[0]):'',
    status:document.getElementById('f-wo-status').value,
    keluhan:document.getElementById('f-wo-keluhan').value,
    diagnosa:document.getElementById('f-wo-diagnosa').value,
    biaya_jasa:jasa,diskon,total,terbayar,sisa_piutang:sisa,
    metode_bayar:metode,
    status_bayar:sisa<=0?'lunas':terbayar>0?'sebagian':'belum'
  };
  showLoading(true);
  try{
    if(isEdit) await dbOp('work_order','UPDATE',{id,payload});
    else await dbOp('work_order','INSERT',{id,...payload});

    // Save parts — hapus lama dulu kalau edit
    if(isEdit){
      const oldParts=await loadTbl('detail_wo_part',q=>q.eq('work_order_id',id));
      for(const op of oldParts) await dbOp('detail_wo_part','DELETE',{id:op.id});
      if(isOnline) try{await sb.from('detail_wo_part').delete().eq('work_order_id',id);}catch(e){}
    }
    for(const p of _woParts){
      if(!p.nama_barang) continue;
      // Jika barang manual (is_non_gudang), tambah ke stok dg jumlah 0 jika belum ada
      let barangId=p.barang_id;
      if(!barangId&&p.nama_barang){
        const existing=(await loadTbl('barang')).find(b=>b.nama.toLowerCase()===p.nama_barang.toLowerCase());
        if(existing) barangId=existing.id;
        else{
          barangId=uid();
          await dbOp('barang','INSERT',{id:barangId,nama:p.nama_barang,kode:'BRG'+Date.now().toString().slice(-5),kategori:'Lainnya',satuan:p.satuan||'pcs',harga_jual:p.harga_jual||0,harga_beli:0,stok:0,stok_minimum:0});
        }
      }
      await dbOp('detail_wo_part','INSERT',{id:uid(),work_order_id:id,barang_id:barangId||null,nama_barang:p.nama_barang,satuan:p.satuan||'pcs',jumlah:p.jumlah||1,harga_jual:p.harga_jual||0,subtotal:p.subtotal||0,is_non_gudang:!barangId});
      // Update stok jika barang dari gudang
      if(barangId&&!p.is_non_gudang&&!isEdit){
        const brg=await dbGet('barang',barangId);
        const stokBaru=Math.max(0,(brg?.stok||0)-Number(p.jumlah||0));
        await dbOp('barang','UPDATE',{id:barangId,payload:{stok:stokBaru}});
        await dbOp('mutasi_stok','INSERT',{id:uid(),barang_id:barangId,jenis:'keluar',jumlah:Number(p.jumlah),stok_sebelum:brg?.stok||0,stok_sesudah:stokBaru,referensi_tipe:'service',referensi_no:no,keterangan:'Part WO '+no,tanggal:payload.tanggal});
      }
    }
    closeModal('modal-wo');
    showToast(isEdit?'WO diperbarui':'WO disimpan');
    await showPage('service',true);
    if(doCetak) cetakWOData({id,...payload},_woParts);
  }catch(e){showToast('Gagal: '+e.message,'error');console.error(e);}
  showLoading(false);
}

async function editWO(id){
  showLoading(true);
  let wo=await dbGet('work_order',id);
  showLoading(false);
  if(!wo){showToast('Data WO tidak ditemukan','error');return;}
  await openWO(wo);
}

async function delWO(id,no){
  if(!await confirm2(`Hapus WO ${no}?`)) return;
  showLoading(true);
  try{
    const parts=await loadTbl('detail_wo_part',q=>q.eq('work_order_id',id));
    for(const p of parts) await dbOp('detail_wo_part','DELETE',{id:p.id});
    await dbOp('work_order','DELETE',{id});
    showToast('WO dihapus');await showPage('service',true);
  }catch(e){showToast('Gagal: '+e.message,'error');}
  showLoading(false);
}

async function cetakWOById(id){
  const wo=await dbGet('work_order',id);
  if(!wo){showToast('Data tidak ditemukan','error');return;}
  const parts=await loadTbl('detail_wo_part',q=>q.eq('work_order_id',id));
  cetakWOData(wo,parts);
}

      <option value="">Semua Status</option><option>draft</option><option>disetujui</option><option>selesai</option>
    </select>
  </div>
  <div id="spk-table-wrap"></div>`;
  renderSPKTable();
};

function renderSPKTable(){
  const q=(document.getElementById('cari-spk')?.value||'').toLowerCase();
  const sf=document.getElementById('filter-spk')?.value||'';
  let data=window._spkAll||[];
  if(sf) data=data.filter(s=>s.status===sf);
  if(q) data=data.filter(s=>(s.no_spk||'').toLowerCase().includes(q)||(s.no_plat||'').toLowerCase().includes(q));
  document.getElementById('spk-table-wrap').innerHTML=`
  <div class="table-wrap"><table><thead><tr><th>No SPK</th><th>Tanggal</th><th>No Plat</th><th>Pelanggan</th><th>Mekanik</th><th>Status</th><th>Ref WO</th><th>Aksi</th></tr></thead>
  <tbody>${data.length?data.map(s=>`<tr>
    <td><code style="color:var(--orange)">${s.no_spk}</code></td>
    <td>${fmtDate(s.tanggal)}</td><td><code>${s.no_plat||'-'}</code></td>
    <td>${s.nama_pelanggan||'-'}</td><td>${s.nama_mekanik||'-'}</td>
    <td><span class="badge ${s.status==='selesai'?'badge-green':s.status==='disetujui'?'badge-orange':'badge-gray'}">${s.status||'draft'}</span></td>
    <td><code style="font-size:11px">${s.no_wo_ref||'-'}</code></td>
    <td><div class="table-actions">
      <button class="btn btn-outline btn-xs" onclick="editSPK('${s.id}')"><i class="ti ti-edit"></i></button>
      <button class="btn btn-outline btn-xs" onclick="cetakSPK('${s.id}')"><i class="ti ti-printer"></i></button>
      <button class="btn btn-danger btn-xs" onclick="delSPK('${s.id}','${s.no_spk}')"><i class="ti ti-trash"></i></button>
    </div></td>
  </tr>`).join(''):'<tr><td colspan="8" class="table-empty"><i class="ti ti-clipboard-off"></i>Belum ada SPK</td></tr>'}</tbody></table></div>`;
}

async function openSPK(spk=null){
  _spkItems=[];
  showLoading(true);
  const [wos,no]=await Promise.all([
    loadTbl('work_order',q=>q.order('tanggal',{ascending:false})),
    spk?Promise.resolve(spk.no_spk):autoNo('SPK','surat_perintah_kerja','no_spk')
  ]);
  if(spk?.id){
    const items=await loadTbl('detail_spk',q=>q.eq('spk_id',spk.id));
    _spkItems=items.sort((a,b)=>(a.urutan||0)-(b.urutan||0)).map(it=>({...it,_id:it.id}));
  }
  showLoading(false);
  ensureModal('modal-spk',`<div class="modal modal-lg">
    <div class="modal-header"><span class="modal-title">${spk?'Edit SPK':'Buat SPK Baru'}</span><button class="modal-close" onclick="closeModal('modal-spk')"><i class="ti ti-x"></i></button></div>
    <div class="modal-body">
      <div class="form-grid">
        <div class="form-group"><label class="form-label">No. SPK</label><input id="f-spk-no" class="form-input" value="${no}"/></div>
        <div class="form-group"><label class="form-label">Tanggal</label><input id="f-spk-tgl" class="form-input" type="date" value="${(spk?.tanggal||today()).slice(0,10)}"/></div>
        <div class="form-group form-full"><label class="form-label">Referensi WO</label>
          <select id="f-spk-wo" class="form-input" onchange="onSPKWOChange()">
            <option value="">-- Tanpa Referensi WO --</option>
            ${wos.map(w=>`<option value="${w.id}" data-no="${w.no_wo}" data-plat="${w.no_plat||''}" data-pel="${w.nama_pelanggan||''}" data-mek="${w.nama_mekanik||''}" data-keluhan="${(w.keluhan||'').replace(/"/g,'&quot;')}">${w.no_wo} - ${w.no_plat||'-'} (${w.status})</option>`).join('')}
          </select>
        </div>
        <div class="form-group"><label class="form-label">No. Plat <span class="req">*</span></label><input id="f-spk-plat" class="form-input" value="${spk?.no_plat||''}"/></div>
        <div class="form-group"><label class="form-label">Pelanggan</label><input id="f-spk-pel" class="form-input" value="${spk?.nama_pelanggan||''}"/></div>
        <div class="form-group"><label class="form-label">Mekanik</label><input id="f-spk-mek" class="form-input" value="${spk?.nama_mekanik||''}"/></div>
        <div class="form-group"><label class="form-label">Status</label>
          <select id="f-spk-status" class="form-input">
            <option value="draft" ${spk?.status==='draft'||!spk?'selected':''}>Draft</option>
            <option value="disetujui" ${spk?.status==='disetujui'?'selected':''}>Disetujui</option>
            <option value="selesai" ${spk?.status==='selesai'?'selected':''}>Selesai</option>
          </select>
        </div>
        <div class="form-group form-full"><label class="form-label">Keluhan</label><textarea id="f-spk-keluhan" class="form-input">${spk?.keluhan||''}</textarea></div>
        <div class="form-group form-full"><label class="form-label">Diagnosa</label><textarea id="f-spk-diagnosa" class="form-input">${spk?.diagnosa||''}</textarea></div>
        <div class="form-group form-full"><label class="form-label">Catatan</label><textarea id="f-spk-catatan" class="form-input">${spk?.catatan||''}</textarea></div>
      </div>
      <div class="divider"></div>
      <div class="section-hdr"><h2><i class="ti ti-list"></i> Item Pekerjaan</h2>
        <button class="btn btn-outline btn-sm" onclick="addSPKItem()"><i class="ti ti-plus"></i> Tambah Item</button>
      </div>
      <div id="spk-items-wrap"></div>
      <input type="hidden" id="f-spk-id" value="${spk?.id||''}"/>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('modal-spk')">Batal</button>
      <button class="btn btn-success" onclick="saveSPK(false)"><i class="ti ti-device-floppy"></i>Simpan</button>

    </div>
  </div>`);

  openModal('modal-spk');
  if(spk?.wo_id) setTimeout(()=>{const sel=document.getElementById('f-spk-wo');if(sel)sel.value=spk.wo_id;},50);
}

function onSPKWOChange(){
  const opt=document.getElementById('f-spk-wo')?.selectedOptions[0];
  if(!opt?.value) return;
  document.getElementById('f-spk-plat').value=opt.dataset.plat||'';
  document.getElementById('f-spk-pel').value=opt.dataset.pel||'';
  document.getElementById('f-spk-mek').value=opt.dataset.mek||'';
  document.getElementById('f-spk-keluhan').value=opt.dataset.keluhan||'';
}

function addSPKItem(){
  _spkItems.push({_id:uid(),nama:'',satuan:'',jumlah:1,keterangan:''});
  renderSPKItems();
}

function renderSPKItems(){
  const el=document.getElementById('spk-items-wrap');if(!el)return;
  if(!_spkItems.length){el.innerHTML='<div style="text-align:center;padding:16px;color:var(--text3);font-size:12px">Belum ada item pekerjaan</div>';return;}
  el.innerHTML=`<table class="parts-table"><thead><tr><th style="width:40%">Nama Pekerjaan</th><th>Qty</th><th>Satuan</th><th>Keterangan</th><th></th></tr></thead><tbody>
  ${_spkItems.map((it,i)=>`<tr>
    <td><input value="${it.nama||''}" placeholder="Nama pekerjaan..." style="border:1px solid var(--border);border-radius:6px;padding:4px 6px;font-size:12px;width:100%;background:var(--input-bg)" onchange="_spkItems[${i}].nama=this.value"/></td>
    <td><input type="number" min="1" value="${it.jumlah||1}" style="border:1px solid var(--border);border-radius:6px;padding:4px;width:55px;font-size:12px;background:var(--input-bg)" onchange="_spkItems[${i}].jumlah=Number(this.value)"/></td>
    <td><input value="${it.satuan||''}" placeholder="unit" style="border:1px solid var(--border);border-radius:6px;padding:4px;width:55px;font-size:12px;background:var(--input-bg)" onchange="_spkItems[${i}].satuan=this.value"/></td>
    <td><input value="${it.keterangan||''}" style="border:1px solid var(--border);border-radius:6px;padding:4px 6px;font-size:12px;width:100%;background:var(--input-bg)" onchange="_spkItems[${i}].keterangan=this.value"/></td>
    <td><button class="btn btn-danger btn-xs" onclick="_spkItems.splice(${i},1);renderSPKItems()"><i class="ti ti-x"></i></button></td>
  </tr>`).join('')}</tbody></table>`;

async function saveSPK(doCetak=false){
  const no=(document.getElementById('f-spk-no')?.value||'').trim();
  const plat=(document.getElementById('f-spk-plat')?.value||'').trim();
  if(!no){showToast('No. SPK wajib diisi','error');return;}
  if(!plat){showToast('No. Plat wajib diisi','error');return;}
  const id=document.getElementById('f-spk-id').value||uid();
  const isEdit=!!document.getElementById('f-spk-id').value;
  const woSel=document.getElementById('f-spk-wo');
  const woId=woSel?.value||null;
  const noWo=woSel?.selectedOptions[0]?.dataset?.no||null;
  const payload={no_spk:no,tanggal:document.getElementById('f-spk-tgl').value,no_plat:plat,nama_pelanggan:document.getElementById('f-spk-pel').value,nama_mekanik:document.getElementById('f-spk-mek').value,status:document.getElementById('f-spk-status').value,keluhan:document.getElementById('f-spk-keluhan').value,diagnosa:document.getElementById('f-spk-diagnosa').value,catatan:document.getElementById('f-spk-catatan').value};
  if(woId) payload.wo_id=woId;
  if(noWo) payload.no_wo_ref=noWo;
  showLoading(true);
  try{
    if(isEdit){
      await dbOp('surat_perintah_kerja','UPDATE',{id,payload});
      const oldItems=await loadTbl('detail_spk',q=>q.eq('spk_id',id));
      for(const oi of oldItems) await dbOp('detail_spk','DELETE',{id:oi.id});
      if(isOnline) try{await sb.from('detail_spk').delete().eq('spk_id',id);}catch(e){}
    }else{
      await dbOp('surat_perintah_kerja','INSERT',{id,...payload});
    }
    for(let i=0;i<_spkItems.length;i++){
      const it=_spkItems[i];if(!it.nama) continue;
      await dbOp('detail_spk','INSERT',{id:uid(),spk_id:id,nama:it.nama,satuan:it.satuan||'',jumlah:it.jumlah||1,keterangan:it.keterangan||'',urutan:i});
    }
    closeModal('modal-spk');showToast(isEdit?'SPK diperbarui':'SPK disimpan');
    await showPage('spk',true);
    if(doCetak) await cetakSPK(id);
  }catch(e){showToast('Gagal: '+e.message,'error');console.error(e);}
  showLoading(false);
}

async function editSPK(id){
  showLoading(true);
  const spk=await dbGet('surat_perintah_kerja',id);
  showLoading(false);
  if(!spk){showToast('Data tidak ditemukan','error');return;}
  await openSPK(spk);
}

async function delSPK(id,no){
  if(!await confirm2(`Hapus SPK ${no}?`)) return;
  showLoading(true);
  try{
    const items=await loadTbl('detail_spk',q=>q.eq('spk_id',id));
    for(const it of items) await dbOp('detail_spk','DELETE',{id:it.id});
    await dbOp('surat_perintah_kerja','DELETE',{id});
    showToast('SPK dihapus');await showPage('spk',true);
  }catch(e){showToast('Gagal: '+e.message,'error');}
  showLoading(false);
}

  const html=`<div class="nota" style="max-width:400px">

    <div class="nota-row"><span class="label">Tanggal</span><span>${fmtDate(spk.tanggal)}</span></div>
    <div class="nota-row"><span class="label">No. Plat</span><span>${spk.no_plat||'-'}</span></div>
    <div class="nota-row"><span class="label">Pelanggan</span><span>${spk.nama_pelanggan||'-'}</span></div>
    <div class="nota-row"><span class="label">Mekanik</span><span>${spk.nama_mekanik||'-'}</span></div>
    ${spk.no_wo_ref?'<div class="nota-row"><span class="label">Ref. WO</span><span>'+spk.no_wo_ref+'</span></div>':''}
    <hr class="nota-divider"/>
    <b>Keluhan:</b><br><span style="font-size:11px">${spk.keluhan||'-'}</span><br><br>
    <b>Diagnosa:</b><br><span style="font-size:11px">${spk.diagnosa||'-'}</span>
    <hr class="nota-divider"/>
    <b>Item Pekerjaan:</b>
    <table class="nota-items" style="margin-top:4px">
      ${items.sort((a,b)=>(a.urutan||0)-(b.urutan||0)).map((it,i)=>`<tr><td>${i+1}. ${it.nama}</td><td>${it.jumlah||''} ${it.satuan||''}</td></tr>`).join('')}
    </table>
    ${spk.catatan?'<hr class="nota-divider"/><span style="font-size:11px"><b>Catatan:</b> '+spk.catatan+'</span>':''}

      <div style="text-align:center"><div style="border-top:1px solid #999;width:100px;margin:40px auto 4px">Mekanik</div></div>
    </div>

    <td style="font-weight:600;font-size:12px;color:var(--orange)">${fmt(p.subtotal)}</td>
    <td><button class="btn btn-danger btn-xs" onclick="_jualParts.splice(${i},1);renderJualParts()"><i class="ti ti-x"></i></button></td>
  </tr>`).join('');
  hitungTotalJual();
}

function onJualPartChange(i,val){
  const brg=(window._jualBrg||[]).find(b=>b.nama===val);
  if(brg){_jualParts[i].barang_id=brg.id;_jualParts[i].harga_jual=brg.harga_jual;_jualParts[i].satuan=brg.satuan;}
  else{_jualParts[i].barang_id='';}
  _jualParts[i].nama_barang=val;
  _jualParts[i].subtotal=_jualParts[i].jumlah*_jualParts[i].harga_jual;
  renderJualParts();
}

function hitungTotalJual(){
  const total=_jualParts.reduce((a,p)=>a+Number(p.subtotal||0),0);
  const el=document.getElementById('total-jual');if(el)el.textContent=fmt(total);
}

async function saveJual(doCetak=false){
  if(!_jualParts.length||!_jualParts.some(p=>p.nama_barang)){showToast('Tambahkan minimal 1 item','error');return;}
  const no=(document.getElementById('f-jl-no')?.value||'').trim();
  if(!no){showToast('No. Faktur wajib diisi','error');return;}
  const id=uid();
  const pelId=document.getElementById('f-jl-pel').value||null;
  const pels=await loadTbl('pelanggan');
  const pelNama=pelId?pels.find(p=>p.id===pelId)?.nama||'':'Umum';
  const total=_jualParts.reduce((a,p)=>a+Number(p.subtotal||0),0);
  const terbayar=Number(document.getElementById('f-jl-bayar').value||0);
  const sisa=Math.max(0,total-terbayar);
  const metode=document.getElementById('f-jl-metode').value;
  showLoading(true);
  try{
    await dbOp('penjualan','INSERT',{id,no_faktur:no,tanggal:document.getElementById('f-jl-tgl').value,pelanggan_id:pelId,nama_pelanggan:pelNama,total,terbayar,sisa_piutang:sisa,metode_bayar:metode,status_bayar:sisa<=0?'lunas':terbayar>0?'sebagian':'belum'});
    for(const p of _jualParts){
      if(!p.nama_barang) continue;
      let brgId=p.barang_id;
      if(!brgId){
        const existing=(await loadTbl('barang')).find(b=>b.nama.toLowerCase()===p.nama_barang.toLowerCase());
        if(existing) brgId=existing.id;
        else{brgId=uid();await dbOp('barang','INSERT',{id:brgId,nama:p.nama_barang,kode:'BRG'+Date.now().toString().slice(-5),kategori:'Lainnya',satuan:p.satuan||'pcs',harga_jual:p.harga_jual||0,harga_beli:0,stok:0,stok_minimum:0});}
      }
      await dbOp('detail_penjualan','INSERT',{id:uid(),penjualan_id:id,barang_id:brgId,nama_barang:p.nama_barang,satuan:p.satuan||'pcs',jumlah:p.jumlah||1,harga_jual:p.harga_jual||0,subtotal:p.subtotal||0});
      if(brgId){
        const brg=await dbGet('barang',brgId);
        const stokBaru=Math.max(0,(brg?.stok||0)-Number(p.jumlah||0));
        await dbOp('barang','UPDATE',{id:brgId,payload:{stok:stokBaru}});
        await dbOp('mutasi_stok','INSERT',{id:uid(),barang_id:brgId,jenis:'keluar',jumlah:Number(p.jumlah),stok_sebelum:brg?.stok||0,stok_sesudah:stokBaru,referensi_tipe:'penjualan',referensi_no:no,keterangan:'Penjualan '+no,tanggal:document.getElementById('f-jl-tgl').value});
      }
    }
    if(sisa>0&&pelId){
      const pel=await dbGet('pelanggan',pelId);
      await dbOp('pelanggan','UPDATE',{id:pelId,payload:{saldo_piutang:(pel?.saldo_piutang||0)+sisa}});
    }
    closeModal('modal-jual');showToast('Penjualan disimpan');
    await showPage('penjualan',true);
    if(doCetak){
      const cfg=await getSettings();
      cetakNotaJual({id,no_faktur:no,tanggal:document.getElementById('f-jl-tgl').value,nama_pelanggan:pelNama,total,terbayar,sisa_piutang:sisa,metode_bayar:metode},_jualParts,cfg);
    }
  }catch(e){showToast('Gagal: '+e.message,'error');console.error(e);}
  showLoading(false);
}

async function cetakJual(id){
  const [jual,parts,cfg]=await Promise.all([dbGet('penjualan',id),loadTbl('detail_penjualan',q=>q.eq('penjualan_id',id)),getSettings()]);
  if(!jual){showToast('Data tidak ditemukan','error');return;}
  cetakNotaJual(jual,parts,cfg);
}

  const html=`<div class="nota">
    ${notaLogo(cfg)}
    <div class="nota-title">${cfg?.nama_bengkel||'WAS GARAGE MANADO'}</div>
    <div class="nota-sub">${cfg?.alamat||''} ${cfg?.telepon?'| '+cfg.telepon:''}</div>
    <hr class="nota-divider"/>
    <div class="nota-row"><span class="label">No. Faktur</span><span><b>${jual.no_faktur}</b></span></div>
    <div class="nota-row"><span class="label">Tanggal</span><span>${fmtDate(jual.tanggal)}</span></div>

    <hr class="nota-divider"/>
    <table class="nota-items"><thead><tr><td><b>Item</b></td><td><b>Qty</b></td><td style="text-align:right"><b>Harga</b></td></tr></thead>
    <tbody>${(parts||[]).map(p=>`<tr><td>${p.nama_barang}</td><td>${p.jumlah} ${p.satuan}</td><td style="text-align:right">${fmt(p.harga_jual)}</td></tr>`).join('')}</tbody></table>
    <hr class="nota-divider"/>
    <div class="nota-row nota-total"><span>TOTAL</span><span>${fmt(jual.total)}</span></div>
    <div class="nota-row"><span class="label">Terbayar</span><span>${fmt(jual.terbayar)}</span></div>
    ${Number(jual.sisa_piutang)>0?'<div class="nota-row"><span class="label" style="color:var(--red)">Sisa Piutang</span><span style="color:var(--red);font-weight:700">'+fmt(jual.sisa_piutang)+'</span></div>':''}

async function delJual(id,no){
  if(!await confirm2(`Hapus faktur ${no}?`)) return;
  showLoading(true);
  try{
    const parts=await loadTbl('detail_penjualan',q=>q.eq('penjualan_id',id));
    for(const p of parts) await dbOp('detail_penjualan','DELETE',{id:p.id});
    await dbOp('penjualan','DELETE',{id});
    showToast('Penjualan dihapus');await showPage('penjualan',true);
  }catch(e){showToast('Gagal: '+e.message,'error');}
  showLoading(false);
}

  document.getElementById('f-bp-pel-id').value=opt.dataset.pel||'';
}

async function saveBayarPiutang(doprint=false){
  // Ambil nilai dari select dropdown langsung (lebih reliable dari hidden input)
  const refSel=document.getElementById('f-bp-ref');
  const refOpt=refSel?.selectedOptions[0];
  const refId=refOpt?.value||document.getElementById('f-bp-ref-id')?.value||'';
  const refTipe=refOpt?.dataset?.tipe||document.getElementById('f-bp-ref-tipe')?.value||'';
  const pelId=refOpt?.dataset?.pel||document.getElementById('f-bp-pel-id')?.value||null;
  const jumlah=Number(document.getElementById('f-bp-jumlah')?.value||0);
  const no=document.getElementById('f-bp-no')?.value||'';
  const tgl=document.getElementById('f-bp-tgl')?.value||today();
  const metode=document.getElementById('f-bp-metode')?.value||'tunai';
  const ket=document.getElementById('f-bp-ket')?.value||'';

  if(!refId||refId===''){showToast('Pilih tagihan terlebih dahulu','error');return;}
  if(!jumlah||jumlah<=0){showToast('Jumlah bayar tidak valid','error');return;}

  showLoading(true);
  try{
    // Siapkan data cetak SEBELUM apapun ditutup
    const cfg=await getSettings();
    let pelNama='Umum';
    if(pelId){
      const pelData=await dbGet('pelanggan',pelId);
      pelNama=pelData?.nama||'Umum';
    }
    // Coba ambil nama pelanggan dari option jika dbGet gagal
    if(pelNama==='Umum'&&refOpt){
      const optLabel=refOpt.text||'';
      const match=optLabel.match(/- ([^-]+) - Sisa/);
      if(match) pelNama=match[1].trim();
    }

    // INSERT riwayat pembayaran
    await dbOp('pembayaran_piutang','INSERT',{
      id:uid(),no_bayar:no,tanggal:tgl,
      pelanggan_id:pelId&&pelId!==''?pelId:null,
      referensi_tipe:refTipe||'penjualan',
      referensi_id:refId,jumlah,metode,keterangan:ket
    });

    // Update sisa di dokumen asal
    const tabel=refTipe==='penjualan'?'penjualan':'work_order';
    const dok=await dbGet(tabel,refId);
    if(dok){
      const newTerbayar=(Number(dok.terbayar)||0)+jumlah;
      const newSisa=Math.max(0,(Number(dok.total)||0)-newTerbayar);
      const newStatus=newSisa<=0?'lunas':newTerbayar>0?'sebagian':'belum';
      await dbOp(tabel,'UPDATE',{id:refId,payload:{terbayar:newTerbayar,sisa_piutang:newSisa,status_bayar:newStatus}});
    }

    // Update saldo piutang pelanggan
    if(pelId&&pelId!==''){
      const pel=await dbGet('pelanggan',pelId);
      if(pel) await dbOp('pelanggan','UPDATE',{id:pelId,payload:{saldo_piutang:Math.max(0,(Number(pel.saldo_piutang)||0)-jumlah)}});
    }

    // Buat HTML nota
    const notaHtml=`<div class="nota">
      ${notaLogo(cfg)}
      <div class="nota-title">${cfg?.nama_bengkel||'WAS GARAGE MANADO'}</div>
      <div class="nota-sub">BUKTI PENERIMAAN PIUTANG</div>
      <hr class="nota-divider"/>
      <div class="nota-row"><span class="label">No. Terima</span><span><b>${no}</b></span></div>
      <div class="nota-row"><span class="label">Tanggal</span><span>${fmtDate(tgl)}</span></div>
      <div class="nota-row"><span class="label">Pelanggan</span><span>${pelNama}</span></div>
      <div class="nota-row"><span class="label">Jumlah Bayar</span><span style="font-weight:700">${fmt(jumlah)}</span></div>
      <div class="nota-row"><span class="label">Metode</span><span>${metode}</span></div>
      ${ket?'<div class="nota-row"><span class="label">Keterangan</span><span>'+ket+'</span></div>':''}
      <hr class="nota-divider"/>
      <div class="nota-footer">${cfg?.footer_nota||'Terima kasih!'}</div>
    </div>`;

    closeModal('modal-bayar-piutang');
    showToast('Penerimaan piutang dicatat');
    await loadPiutangList();
    await loadRiwayatPiutang();

    // Cetak jika diminta
    if(doprint){
      setTimeout(async()=>{ await doCetak(notaHtml); }, 350);
    }
  }catch(e){
    showToast('Gagal: '+e.message,'error');
    console.error('saveBayarPiutang error:',e);
  }
  showLoading(false);
}

async function delRiwayatPiutang(id,no){
  if(!await confirm2(`Hapus riwayat ${no}?\nCatatan: saldo piutang tidak otomatis dikembalikan.`)) return;
  showLoading(true);
  try{await dbOp('pembayaran_piutang','DELETE',{id});showToast('Riwayat dihapus');await loadRiwayatPiutang();}
  catch(e){showToast('Gagal: '+e.message,'error');}
  showLoading(false);
}

async function renderBeliTable(){

    if(!detMap[d.pembelian_id]) detMap[d.pembelian_id]=[];
    detMap[d.pembelian_id].push(d);
  });
  const rows=data.length?data.map(b=>{
    const items=detMap[b.id]||[];
    const itemStr=items.length
      ? items.map(d=>'<span style="display:inline-block;background:var(--bg3);border:1px solid var(--border);border-radius:4px;padding:1px 6px;font-size:11px;margin:1px">'+d.nama_barang+' <b>('+fmtNum(d.jumlah)+' '+d.satuan+')</b></span>').join(' ')
      : '<span style="color:var(--text3);font-size:11px">-</span>';
    return '<tr>'+
      '<td><code style="color:var(--orange)">'+b.no_faktur+'</code></td>'+
      '<td>'+fmtDate(b.tanggal)+'</td>'+
      '<td>'+(b.nama_supplier||'-')+'</td>'+
      '<td style="max-width:250px;white-space:normal">'+itemStr+'</td>'+
      '<td style="font-weight:700">'+fmt(b.total)+'</td>'+
      '<td style="color:var(--green)">'+fmt(b.terbayar)+'</td>'+
      '<td style="'+(Number(b.sisa_hutang)>0?'color:var(--red);font-weight:700':'color:var(--text3)')+'">'+fmt(b.sisa_hutang)+'</td>'+
      '<td><span class="badge '+(b.status_bayar==='lunas'?'badge-green':b.status_bayar==='sebagian'?'badge-orange':'badge-red')+'">'+(b.status_bayar||'belum')+'</span></td>'+

  <div class="table-wrap"><table><thead><tr><th>No Faktur</th><th>Tanggal</th><th>Supplier</th><th>Item Barang</th><th>Total</th><th>Terbayar</th><th>Sisa Hutang</th><th>Status</th><th>Aksi</th></tr></thead>
  <tbody>${rows}</tbody></table></div>`;
}
